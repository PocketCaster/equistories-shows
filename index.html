function renderHorseProfilePage(app, h){
  if(!h.pedigree) h.pedigree={};

  // Build the shareable link so it also carries the Stable Data URL as a
  // `stable` param — this is what lets someone who has never configured
  // Admin settings in their own browser still load this public profile.
  const shareUrl = new URL(window.location.origin + window.location.pathname);
  shareUrl.searchParams.set('horse', h.id);
  if(STABLE_URL) shareUrl.searchParams.set('stable', STABLE_URL);

  const pct = h.level>=10?100:Math.min(100,((h.exp-(LEVEL_TABLE[h.level]?.exp||0))/((LEVEL_TABLE[h.level+1]?.exp||1)-(LEVEL_TABLE[h.level]?.exp||0)))*100);

  const genoPrice    = calcGenoPrice(h);
  const showEarnings = calcShowEarnings(h);
  const netWorth     = calcNetWorth(h);
  const slotPrice    = calcSlotPrice(h);

  const statBars = STATS.map(s=>{
    const base=h.stats[s]||0, bonus=getEquippedStatBonus(h,s), eff=base+bonus;
    return `<div style="padding:4px 0;white-space:nowrap;">
      <span style="font-size:1em;color:#b5a392;">${STAT_LABELS[s]}:</span>
      <span style="font-size:1em;font-weight:bold;color:#c98a3a;margin-left:6px;" title="${bonus?`Base ${base} + ${bonus} from tack = ${eff}`:`Base ${base}`}">${base}${bonus?` <span style="color:#7a9b6e;font-weight:normal;">(+${bonus})</span>`:""}</span>
    </div>`;
  }).join("");

  let slotsHtml="";
  for(let i=0;i<h.breedingSlots;i++){
    const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===i);
    slotsHtml+=`<div class="slot${rec?" filled":""}" title="${rec?(rec.partnerName||"Used"):"Open slot"}">${i+1}</div>`;
  }

  const breedingRecHtml = (h.breedingRecords||[]).length ? (h.breedingRecords.map(r=>`
    <div class="small" style="padding:6px;background:#15100c;border-radius:5px;margin-bottom:4px;">
      Slot ${r.slotIndex+1} — ${r.role==="sire"?"Sired with":"Bred to"} <b>${r.partnerName}</b>${r.partnerOwner?` (${r.partnerOwner})`:""}${r.date?` · ${r.date}`:""}
      ${r.foalId?` → <span onclick="goToProfile('${r.foalId}')" style="color:#c98a3a;cursor:pointer;text-decoration:underline;">Foal: ${r.foalName}</span>`:r.foalName?` → Foal: ${r.foalName} (unlinked)`:""}
      ${r.note?`<br><i style="opacity:.7;">${r.note}</i>`:""}
    </div>`).join("")) : `<div class="small" style="opacity:.6;">No breeding records.</div>`;

  const inv=state.tackInventory||[];
  const tackEquippedHtml=(h.tackEquipped||[]).map(tid=>{
    const item=inv.find(t=>t.id===tid);
    if(!item) return "";
    const s=Object.entries(item.stats||{}).map(([k,v])=>`+${v} ${STAT_LABELS[k]}`).join(", ");
    if(item.image){
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;width:150px;">
        <img src="${item.image}" style="width:150px;height:150px;object-fit:contain;cursor:zoom-in;border:1px solid #3a7a5a;border-radius:6px;background:#15100c;"
             onclick="openLightbox('${jsStr(item.image)}','${jsStr(item.name)}')" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
        <span class="tag" style="display:none;background:#1a3a2a;color:#a0e8c0;border-color:#3a7a5a;">${item.name}</span>
        <div class="small" style="text-align:center;color:#a0e8c0;">${item.name}${s?`<br><span style="color:#7a9b6e;">${s}</span>`:""}</div>
      </div>`;
    }
    return `<span class="tag" style="background:#1a3a2a;color:#a0e8c0;border-color:#3a7a5a;">${item.name}${s?` (${s})`:""}</span>`;
  }).join(" ")||`<span class="small">Nothing equipped.</span>`;

  const trophies=(h.compHistory||[]).filter(c=>c.placement>=1&&c.placement<=3);
  const allPrizeImages=trophies.flatMap(c=>(c.prizes||[]).map(p=>({...p, discipline:c.discipline, placeStr:["1st","2nd","3rd"][c.placement-1]})));
  const ribbonWall=allPrizeImages.length?`<div style="display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;">
    ${allPrizeImages.map(p=>`<img src="${p.dataUrl}" style="width:280px;height:280px;object-fit:contain;cursor:zoom-in;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||(p.discipline+' — '+p.placeStr))}')" onerror="this.style.display='none'" />`).join("")}
  </div>`:null;

  const compHistoryHtml=(h.compHistory||[]).length?`<div class="artlog-panel" style="max-height:280px;">${(h.compHistory||[]).map(c=>{
    const pl=c.placement;
    const icon=pl===1?"":pl===2?"":pl===3?"":pl?"":"";
    const label=pl?["1st","2nd","3rd","4th","5th","6th"][pl-1]||pl+"th":"Participant";
    const prizes=c.prizes||[];
    return `<div class="artlog-entry" style="display:flex;gap:8px;align-items:flex-start;">
      ${c.image?`<img src="${c.image}" class="artlog-thumb" style="flex:none;cursor:zoom-in;" onclick="openLightbox('${jsStr(c.image)}','${jsStr(c.discipline)}')" onerror="this.style.display='none'" />`:""}
      <div style="flex:1;">
        ${icon} <b>${c.discipline}</b>${c.difficulty?" — "+c.difficulty:""} <span class="tag">${label}</span>
        ${c.venue?`<div class="small">${c.venue}${c.date?" · "+c.date:""}</div>`:(c.date?`<div class="small">${c.date}</div>`:"")}
        ${c.note?`<div class="small" style="opacity:.8;">${c.note}</div>`:""}
        ${prizes.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
          ${prizes.map(p=>`<div style="text-align:center;">
            <img src="${p.dataUrl}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid #4a392a;cursor:zoom-in;display:block;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||'Prize')}')" onerror="this.style.display='none'" />
          </div>`).join("")}
        </div>`:""}
      </div>
    </div>`;
  }).join("")}</div>` : `<div class="small" style="opacity:.6;">No competition history.</div>`;

  const artLogHtml=h.artLog.length?`<div class="artlog-panel" style="max-height:300px;">${h.artLog.map(e=>`
    <div class="artlog-entry" style="display:flex;gap:8px;align-items:flex-start;">
      ${e.image?`<img src="${e.image}" class="artlog-thumb" style="flex:none;cursor:zoom-in;" onclick="openLightbox('${jsStr(e.image)}','${jsStr(e.label)}')" />`:""}
      <div><b>${e.label}</b> <span class="tag">+${e.exp} EXP</span>
        ${e.link?`<a href="${e.link}" target="_blank" style="color:#c98a3a;font-size:1em;margin-left:4px;"></a>`:""}
        <div class="small">${e.art||""}${e.lit?` · ${e.lit}`:""}</div>
      </div>
    </div>`).join("")}</div>`:
    `<div class="small" style="opacity:.6;">No art logged yet.</div>`;

  const photoHtml = h.profileImage
    ? `<img src="${h.profileImage}" onclick="openLightbox('${jsStr(h.profileImage)}','${jsStr(h.name)}')" style="width:min(300px,55vw);height:min(300px,55vw);border-radius:10px;object-fit:cover;border:3px solid #c98a3a;cursor:zoom-in;" />`
    : `<div style="width:min(300px,55vw);height:min(300px,55vw);border-radius:10px;border:3px solid #4a392a;display:flex;align-items:center;justify-content:center;font-size:3.5em;background:#15100c;"></div>`;

  const refColumnHtml = (h.referenceImage || bankAccount.linked)
    ? `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:20px;padding-top:20px;border-top:1px solid #4a392a;">
        <div class="small" style="text-align:center;">Reference / Registration${h.referenceLink?` · <a href="${h.referenceLink}" target="_blank">View on site</a>`:""}</div>
        ${h.referenceImage
          ? `<img src="${h.referenceImage}" onclick="openLightbox('${jsStr(h.referenceImage)}','${jsStr(h.name+' — Reference / Registration')}')" style="width:min(560px,92%);max-height:460px;border-radius:10px;object-fit:contain;border:3px solid var(--accent, #c98a3a);cursor:zoom-in;background:#15100c;box-shadow:0 6px 20px rgba(0,0,0,.45);" />`
          : `<div style="width:min(560px,92%);height:260px;border-radius:10px;border:3px solid #4a392a;display:flex;align-items:center;justify-content:center;font-size:1em;background:#15100c;color:#8a7a6a;text-align:center;padding:10px;">No reference sheet uploaded yet.</div>`}
        ${bankAccount.linked?`
          <button id="pp_ref_change_btn" class="secondary" style="font-size:.92em;">Change Image</button>
          <div id="pp_ref_url_wrap" style="display:none;width:100%;max-width:420px;">
            <input type="text" id="pp_ref_url" placeholder="Paste a direct link to the reference sheet image (.jpg/.png/.gif)" value="${escAttr(h.referenceImage||"")}" style="width:100%;font-size:.9em;" />
            <div id="pp_ref_preview" style="margin-top:8px;">${h.referenceImage?urlImagePreviewHTML(h.referenceImage, h.name+' — Reference Sheet'):''}</div>
          </div>
        `:""}
      </div>`
    : "";

  app.innerHTML=`
    <style>
      body { background:#1b1410; color:#f1e6d8; font-family:Georgia,serif; margin:0; padding:0; }
      .pcard { background:#241a14; border:1px solid #4a392a; border-radius:10px; padding:clamp(18px,3vw,28px); margin-bottom:20px; }
      .pcard h3 { color:#c98a3a; margin-top:0; font-family:"Palatino Linotype",Georgia,serif; }
      .pcard .small { font-size:1em; color:#b5a392; }
      a { color:#c98a3a; }
      .statbar-wrap { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
      .statbar-bg { flex:1; height:8px; background:#15100c; border-radius:4px; overflow:hidden; }
      .statbar-fill { height:100%; background:linear-gradient(90deg,#7a9b6e,#c98a3a); }
      .expbar-bg { height:10px; background:#15100c; border-radius:5px; overflow:hidden; margin-top:6px; }
      .expbar-fill { height:100%; background:linear-gradient(90deg,#8a6fb0,#c98a3a); }
      .tag { display:inline-block; font-size:.97em; padding:4px 10px; border-radius:10px; background:#15100c; color:#b5a392; border:1px solid #4a392a; margin-left:5px; }
      .slot { width:26px; height:26px; border-radius:50%; border:1px solid #c98a3a; display:inline-flex; align-items:center; justify-content:center; font-size:1.1em; margin-right:6px; }
      .slot.filled { background:#c98a3a; color:#15100c; }
      .artlog-panel { background:#15100c; border:1px solid #4a392a; border-radius:6px; padding:12px; overflow-y:auto; }
      .artlog-entry { padding:10px 0; border-bottom:1px dashed #2c2118; }
      .artlog-entry:last-child { border-bottom:none; }
      .artlog-thumb { width:60px; height:60px; border-radius:5px; object-fit:cover; border:1px solid #4a392a; }
      .breedslots { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
      .worth-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #2c2118; font-size:1.04em; }
      .worth-row:last-child { border-bottom:none; font-weight:bold; color:#c98a3a; }
    </style>

    <div style="width:100%;margin:0 auto;padding:clamp(16px,3vw,32px);">
      <div style="margin-bottom:12px;"><span data-act="back-to-roster" style="color:#c98a3a;text-decoration:none;cursor:pointer;">← Back to Stable Manager</span></div>

      <div class="pcard">
        <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
          ${photoHtml}
          ${bankAccount.linked?`
            <button id="pp_photo_change_btn" class="secondary" style="width:min(300px,55vw);font-size:.85em;">Change Image</button>
            <div id="pp_photo_url_wrap" style="display:none;width:100%;">
              <input type="text" id="pp_photo_url" placeholder="Paste a direct link to the photo (.jpg/.png/.gif)" value="${escAttr(h.profileImage||"")}" style="max-width:min(300px,55vw);width:100%;font-size:.9em;" />
            </div>
          `:""}
          ${h.ownerName?`<div class="small" style="text-align:center;">Owner: ${h.ownerLink?`<a href="${h.ownerLink}" target="_blank">${h.ownerName}</a>`:h.ownerName}</div>`:""}
          ${h.riderName?`<div class="small" style="text-align:center;">Rider: ${h.riderName}</div>`:""}
          ${h.stableName?`<div class="small" style="text-align:center;">Stable: ${h.stableLink?`<a href="${h.stableLink}" target="_blank">${h.stableName}</a>`:h.stableName}</div>`:""}
        </div>
        <div style="flex:1;min-width:220px;">
          <h1 style="margin:0 0 4px;color:#c98a3a;font-size:1.9em;">${h.name}</h1>
          ${(h.badges||[]).length?`<div style="margin-bottom:6px;">${h.badges.map(b=>`<span class="tag" style="background:#3a2a10;color:#e8c86a;border-color:#c98a3a;">${b}</span>`).join(" ")}</div>`:""}
          <div class="small" style="font-size:1.1em;">${h.breed}${h.gender?` · ${h.gender}`:""} · Age ${h.age} (${h.stage})</div>
          ${h.phenotype?`<div class="small">Phenotype: ${h.phenotype}</div>`:""}
          ${h.genotype?`<div class="small">Genotype: ${h.genotype}</div>`:""}
          <div style="margin-top:8px;"><span class="tag" style="font-size:1.02em;">Level ${h.level}</span> <span class="tag" style="font-size:1.02em;">${h.exp} EXP</span></div>
          <div class="expbar-bg" style="margin-top:6px;max-width:260px;"><div class="expbar-fill" style="width:${pct}%"></div></div>
          <div style="margin-top:12px;">
            <h3 style="margin-bottom:8px;">Stats</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:4px;">${statBars}</div>
          </div>
          <div style="margin-top:16px;font-size:.98em;color:#b5a392;">Net Worth: <b style="color:#c98a3a;">฿${netWorth.toLocaleString()}</b> &nbsp;|&nbsp; Breeding Slot: <b style="color:#c98a3a;">฿${slotPrice.toLocaleString()}</b></div>
          <details style="margin-top:4px;">
            <summary style="cursor:pointer;font-size:.85em;color:#8a7a6a;">Breakdown</summary>
            <div style="margin-top:6px;font-size:.85em;max-width:280px;">
              <div class="small" style="margin-bottom:4px;font-size:.9em;">Lightblood Pricing Guide · Slot = Net Worth × 5%.</div>
              <div class="worth-row" style="padding:4px 0;"><span>Genotype Base Price</span><span>฿${(h.genoBasePrice||0).toLocaleString()}</span></div>
              ${(h.genoModifiers||[]).map(m=>`<div class="worth-row" style="padding:4px 0;"><span>${m.label}</span><span>฿${(m.value||0).toLocaleString()}</span></div>`).join("")}
              <div class="worth-row" style="padding:4px 0;"><span>Total Genotype Value</span><span>฿${genoPrice.toLocaleString()}</span></div>
              <div class="worth-row" style="padding:4px 0;"><span>Show Earnings</span><span>฿${showEarnings.toLocaleString()}</span></div>
              ${h.customNetWorth!==null&&h.customNetWorth!==undefined&&h.customNetWorth!==""?`<div class="worth-row" style="padding:4px 0;"><span style="color:#d4a030;">⚠ Custom override</span><span>฿${Number(h.customNetWorth).toLocaleString()}</span></div>`:""}
              <div class="worth-row" style="padding:4px 0;margin-top:2px;padding-top:6px;border-top:1px solid #4a392a;"><span>NET WORTH</span><span>฿${netWorth.toLocaleString()}</span></div>
              <div class="worth-row" style="padding:4px 0;"><span>Breeding Slot (5%)</span><span>฿${slotPrice.toLocaleString()}</span></div>
            </div>
          </details>
          <button id="pp_edit_profile_btn" class="secondary" style="margin-top:12px;font-size:.95em;padding:6px 14px;">Edit Profile</button>
        </div>
        </div>
        ${refColumnHtml}
      </div>

      ${h.personality||h.horseHistory ? `<div class="pcard">
        ${h.personality?`<h3>Personality</h3><p style="font-size:1.06em;line-height:1.7;white-space:pre-wrap;">${h.personality}</p>`:""}
        ${h.horseHistory?`<h3>History</h3><p style="font-size:1.06em;line-height:1.7;white-space:pre-wrap;">${h.horseHistory}</p>`:""}
      </div>` : ""}

      <div class="pcard">
        <h3>Pedigree</h3>
        ${renderPedigreeChart(h)}
        <h3 style="margin-top:16px;">Breeding Slots</h3>
        <div class="breedslots">${slotsHtml||'<span class="small">none yet</span>'}</div>
        <div style="margin-top:10px;">${breedingRecHtml}</div>
      </div>

      <div class="pcard">
        <h3>Equipped Tack</h3>
        <div>${tackEquippedHtml}</div>
      </div>

      <div class="pcard">
        <h3>Ribbon Wall</h3>
        ${ribbonWall || '<div class="small" style="opacity:.6;">No placements yet.</div>'}
        <h3 style="margin-top:16px;">Competition History</h3>
        ${compHistoryHtml}
      </div>

      <div class="pcard">
        <h3>Art Log</h3>
        ${artLogHtml}
      </div>

      <div style="text-align:center;margin:20px 0;">
        <div class="small" style="margin-bottom:6px;">Shareable link to this profile:</div>
        <input readonly value="${shareUrl.toString()}" onclick="this.select()" style="max-width:480px;width:100%;text-align:center;padding:8px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:6px;font-family:monospace;" />
      </div>
    </div>
  `;

  const backLink = app.querySelector('[data-act="back-to-roster"]');
  if(backLink) backLink.onclick = goToRoster;

  const editProfileBtn = app.querySelector('#pp_edit_profile_btn');
  if(editProfileBtn) editProfileBtn.onclick = ()=>showProfileModal(h.id);

  // FIX: profile photo used to be a file upload run through resizeImageFile
  // and base64-encoded, which could still blow past the JSONP/Sheets size
  // limit for a full-res phone photo. It's now a pasted direct image link,
  // same as the show/prize/training art elsewhere in the app — save fires
  // on blur so we're not hammering the sheet on every keystroke.
  const photoChangeBtn = app.querySelector('#pp_photo_change_btn');
  const photoUrlWrap = app.querySelector('#pp_photo_url_wrap');
  if(photoChangeBtn && photoUrlWrap){
    photoChangeBtn.onclick = ()=>{
      photoUrlWrap.style.display = 'block';
      photoChangeBtn.style.display = 'none';
      const inp = app.querySelector('#pp_photo_url');
      if(inp) inp.focus();
    };
  }

  const refChangeBtn = app.querySelector('#pp_ref_change_btn');
  const refUrlWrap = app.querySelector('#pp_ref_url_wrap');
  if(refChangeBtn && refUrlWrap){
    refChangeBtn.onclick = ()=>{
      refUrlWrap.style.display = 'block';
      refChangeBtn.style.display = 'none';
      const inp = app.querySelector('#pp_ref_url');
      if(inp) inp.focus();
    };
  }

  const photoInput = app.querySelector('#pp_photo_url');
  if(photoInput){
    photoInput.onblur = async ()=>{
      const url = photoInput.value.trim() || null;
      if(url === (h.profileImage||null)) return;
      h.profileImage = url;
      render();
      const ok = await saveHorse(h);
      if(!ok) alert(`${h.name}'s photo was updated here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
    };
  }

  const refInput = app.querySelector('#pp_ref_url');
  if(refInput){
    refInput.oninput = ()=>{
      app.querySelector('#pp_ref_preview').innerHTML = urlImagePreviewHTML(refInput.value.trim(), h.name+' — Reference Sheet');
    };
    refInput.onblur = async ()=>{
      const url = refInput.value.trim() || null;
      if(url === (h.referenceImage||null)) return;
      h.referenceImage = url;
      let bonusMsg = "";
      if(url && !h.refBonusGiven){
        h.refBonusGiven = true;
        h.exp += REF_SHEET_EXP;
        checkLevelUp(h);
        addLog(`${h.name} — Reference sheet submitted · +${REF_SHEET_EXP} EXP`);
        bonusMsg = ` +${REF_SHEET_EXP} EXP awarded for first reference sheet submission!`;
      }
      render();
      const ok = await saveHorse(h);
      if(!ok) alert(`${h.name}'s reference sheet was updated here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
      else if(bonusMsg) alert(`Reference sheet saved for ${h.name}.${bonusMsg}`);
    };
  }
}



// ============================================
// PROFILE EDIT MODAL (owner, rider, stable, personality, history)
// ============================================

function showProfileModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';

  function field(id, label, val, placeholder, type='input'){
    const inp = type==='textarea'
      ? `<textarea id="${id}" rows="4" placeholder="${placeholder}" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:3px;box-sizing:border-box;font-family:Georgia,serif;resize:vertical;">${val||''}</textarea>`
      : `<input id="${id}" value="${val||''}" placeholder="${placeholder}" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:3px;box-sizing:border-box;" />`;
    return `<div style="margin-bottom:10px;"><label style="font-size:.98em;color:#b5a392;text-transform:uppercase;display:block;">${label}</label>${inp}</div>`;
  }

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:520px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">
    <h3 style="margin-top:0;color:#c98a3a;">Edit Profile — ${h.name}</h3>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;">${field('pm_breed','Breed',h.breed,'e.g. Thoroughbred')}</div>
      <div style="width:110px;">${field('pm_age','Age',h.age,'e.g. 5')}</div>
    </div>
    <div class="small" style="margin:-4px 0 10px;opacity:.7;">Changing age here won't skip training age-up milestones — the horse's stage (foal/yearling/adult) still updates from those. Changing breed won't recompute existing genetics.</div>
    ${field('pm_owner','Owner Name',h.ownerName,'e.g. @YourUsername')}
    ${field('pm_ownerlink','Owner Link (optional)',h.ownerLink,'https://… (DeviantArt, Toyhouse…)')}
    ${field('pm_rider','Rider Name (optional)',h.riderName,'e.g. Jane Smith')}
    ${field('pm_stable','Stable / Boarding (optional)',h.stableName,'e.g. Willowbrook Stables')}
    ${field('pm_stablelink','Stable Link (optional)',h.stableLink,'https://…')}
    ${field('pm_personality','Personality',h.personality,'Describe this horse - personality, quirks, and character...','textarea')}
    ${field('pm_history','History',h.horseHistory,'Background story, significant events, journey so far…','textarea')}
    <button id="pm_save" style="width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1.1em;">Save</button>
    <button id="pm_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:10px;border-radius:6px;cursor:pointer;font-size:1.1em;">Cancel</button>
    <div id="pm_status" style="margin-top:8px;font-size:.92em;color:#b5a392;text-align:center;min-height:1.2em;"></div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#pm_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#pm_save').onclick=async()=>{
    const saveBtn = overlay.querySelector('#pm_save');
    const statusEl = overlay.querySelector('#pm_status');
    saveBtn.disabled = true;
    const origLabel = saveBtn.textContent;
    saveBtn.textContent = 'Saving…';
    statusEl.textContent = 'Saving to your Stable Data sheet — this can take up to 15 seconds…';
    const slowNotice = setTimeout(()=>{
      statusEl.textContent = "Still working — slow connections or a busy sheet can take a bit longer. Don't close this window.";
    }, 6000);
    try{
      h.breed = overlay.querySelector('#pm_breed').value.trim() || h.breed;
      const newAge = Number(overlay.querySelector('#pm_age').value);
      if(!isNaN(newAge) && newAge >= 0) h.age = newAge;
      h.ownerName  = overlay.querySelector('#pm_owner').value.trim();
      h.ownerLink  = overlay.querySelector('#pm_ownerlink').value.trim();
      h.riderName  = overlay.querySelector('#pm_rider').value.trim();
      h.stableName = overlay.querySelector('#pm_stable').value.trim();
      h.stableLink = overlay.querySelector('#pm_stablelink').value.trim();
      h.personality  = overlay.querySelector('#pm_personality').value.trim();
      h.horseHistory = overlay.querySelector('#pm_history').value.trim();
      // Save the horse record and the shared stable state in parallel —
      // they're independent writes, so there's no need to wait on one
      // before starting the other. Roughly halves the worst-case wait
      // compared to running them one after another.
      const [ok] = await Promise.all([ saveHorse(h), save() ]);
      clearTimeout(slowNotice);
      overlay.remove(); render();
      if(!ok) alert(`Profile was updated here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
    }catch(err){
      clearTimeout(slowNotice);
      console.error('[EquiStories] Edit Profile save failed:', err);
      saveBtn.disabled = false;
      saveBtn.textContent = origLabel;
      statusEl.textContent = '';
      alert(`Something went wrong while saving this profile. Try again, or check your Stable Data URL in Admin settings.\n(Open your browser's console — F12 or right-click → Inspect → Console — for the technical error.)`);
    }
  };
}

// ============================================
// NET WORTH MODAL (Lightblood pricing)
// ============================================

function showNetWorthModal(horseId){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  if(!h.genoModifiers) h.genoModifiers=[];

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';

  function inp(style=''){
    return `style="padding:6px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;${style}"`;
  }

  const baseOpts = GENO_BASE_PRICES.map(p=>`<option value="${p.value}" ${h.genoBasePrice===p.value?"selected":""}>${p.label} — ฿${p.value}</option>`).join("");
  // Only the horse's own saved genotype string is available here (no live
  // locus selections), so the Bloodmark/Peacock Appaloosa prerequisite is
  // checked by looking for the required allele code as a whole token in
  // that string (genotype codes are space-separated, e.g. "EE Aa Gg ...").
  const genotypeTokens = (h.genotype||"").split(/\s+/);
  const hasSavedCode=(locus,code)=>genotypeTokens.includes(code);
  const modGroups = Object.entries(GENO_MODIFIERS).map(([group, items])=>`
    <optgroup label="— ${group} —">
      ${items.filter(m=>markingMeetsGeneRequirement(m.label, hasSavedCode))
        .map(m=>`<option value="${m.value}|${m.label}">${m.label} (+฿${m.value})</option>`).join("")}
    </optgroup>`).join("");
  const genoNote = h.genotype
    ? `<p class="small" style="color:#7a9b6e;margin:4px 0 10px;">Base genetics: <b>${h.genotype}</b> (${h.phenotype||""}) — set on the Roster tab. This section is for extra fictitious/rare markings and mane types on top of that.</p>`
    : `<p class="small" style="color:#b5a392;margin:4px 0 10px;">No structured genetics set yet — use "Set Genetics" on the roster card to pick real coat color alleles. This section is for extra fictitious/rare markings and mane types.</p>`;

  const existingMods = h.genoModifiers.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span style="flex:1;font-size:1.02em;">${m.label}</span>
      <span style="color:#c98a3a;font-size:1.02em;">+฿${m.value}</span>
      <button data-remove="${i}" style="background:#b1473f;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.98em;">✕</button>
    </div>`).join("") || `<div class="small" style="opacity:.6;">No modifiers added yet.</div>`;

  const currentNW = calcNetWorth(h);
  const currentSlot = calcSlotPrice(h);

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:540px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">
    <h3 style="margin-top:0;color:#c98a3a;">Net Worth — ${h.name}</h3>
    <p style="color:#b5a392;font-size:1.02em;margin-top:0;">Based on the Lightblood Pricing Guide. Breeding slot = Net Worth × 5%.</p>

    <label style="font-size:.98em;color:#b5a392;text-transform:uppercase;display:block;margin-bottom:3px;">Genotype Base Price</label>
    <select id="nw_base" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-bottom:12px;">
      <option value="0">— Select base —</option>
      ${baseOpts}
    </select>

    <label style="font-size:.98em;color:#b5a392;text-transform:uppercase;display:block;margin-bottom:3px;">Add Modifier</label>
    ${genoNote}
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <select id="nw_mod_pick" style="flex:1;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;">
        <option value="">— Pick modifier —</option>
        ${modGroups}
      </select>
      <button id="nw_add_mod" style="background:#c98a3a;color:#241a14;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-weight:bold;white-space:nowrap;">+ Add</button>
    </div>

    <div id="nw_mod_list" style="background:#15100c;border:1px solid #4a392a;border-radius:5px;padding:8px;min-height:36px;margin-bottom:12px;">
      ${existingMods}
    </div>

    <label style="font-size:.98em;color:#b5a392;text-transform:uppercase;display:block;margin-bottom:3px;">Custom Net Worth Override <span style="opacity:.6;">(optional — leave blank to use calculated value)</span></label>
    <input id="nw_custom" type="number" value="${h.customNetWorth!==null&&h.customNetWorth!==undefined&&h.customNetWorth!==""?h.customNetWorth:''}" placeholder="e.g. 5000" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:12px;" />

    <div id="nw_preview" style="background:#15100c;border:1px solid #4a392a;border-radius:6px;padding:10px;margin-bottom:12px;font-size:1.04em;">
      <div style="display:flex;justify-content:space-between;"><span>Genotype Value</span><span>฿${calcGenoPrice(h).toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;"><span>Show Earnings</span><span>฿${calcShowEarnings(h).toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:6px;border-top:1px solid #2c2118;font-weight:bold;color:#c98a3a;"><span>Net Worth</span><span>฿${currentNW.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;color:#c98a3a;"><span>Slot Price (5%)</span><span>฿${currentSlot.toLocaleString()}</span></div>
    </div>

    <button id="nw_save" style="width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1.1em;">Save</button>
    <button id="nw_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:10px;border-radius:6px;cursor:pointer;font-size:1.1em;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#nw_cancel').onclick=()=>overlay.remove();

  function refreshPreview(){
    const base=Number(overlay.querySelector('#nw_base').value)||0;
    const custom=overlay.querySelector('#nw_custom').value.trim();
    const geno=base+(h.genoModifiers||[]).reduce((s,m)=>s+(m.value||0),0);
    const shows=calcShowEarnings(h);
    const nw=custom!==""?Number(custom):(geno+shows);
    const slot=Math.round(nw*0.05);
    overlay.querySelector('#nw_preview').innerHTML=`
      <div style="display:flex;justify-content:space-between;"><span>Genotype Value</span><span>฿${geno.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;"><span>Show Earnings</span><span>฿${shows.toLocaleString()}</span></div>
      ${custom!==""?`<div style="display:flex;justify-content:space-between;color:#d4a030;"><span>⚠ Custom override</span><span>฿${Number(custom).toLocaleString()}</span></div>`:""}
      <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:6px;border-top:1px solid #2c2118;font-weight:bold;color:#c98a3a;"><span>Net Worth</span><span>฿${nw.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;color:#c98a3a;"><span>Slot Price (5%)</span><span>฿${slot.toLocaleString()}</span></div>`;
  }

  overlay.querySelector('#nw_base').onchange=refreshPreview;
  overlay.querySelector('#nw_custom').oninput=refreshPreview;

  overlay.querySelector('#nw_add_mod').onclick=()=>{
    const val=overlay.querySelector('#nw_mod_pick').value;
    if(!val) return;
    const [price, ...labelParts]=val.split('|');
    const label=labelParts.join('|');
    h.genoModifiers.push({label, value:Number(price)});
    refreshModList();
    refreshPreview();
    overlay.querySelector('#nw_mod_pick').value='';
  };

  function refreshModList(){
    const list=overlay.querySelector('#nw_mod_list');
    list.innerHTML=h.genoModifiers.length ? h.genoModifiers.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="flex:1;font-size:1.02em;">${m.label}</span>
        <span style="color:#c98a3a;font-size:1.02em;">+฿${m.value}</span>
        <button data-remove="${i}" style="background:#b1473f;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.98em;">✕</button>
      </div>`).join("") : `<div class="small" style="opacity:.6;">No modifiers added yet.</div>`;
    list.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{
      h.genoModifiers.splice(Number(b.dataset.remove),1);
      refreshModList(); refreshPreview();
    });
  }
  refreshModList();

  overlay.querySelector('#nw_save').onclick=async()=>{
    h.genoBasePrice=Number(overlay.querySelector('#nw_base').value)||0;
    const custom=overlay.querySelector('#nw_custom').value.trim();
    h.customNetWorth=custom!==""?Number(custom):null;
    const ok = await saveHorse(h);
    await save();
    overlay.remove(); render();
    if(!ok) alert(`Net worth was updated here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
  };
}

// ============================================
// BOOT
// ============================================

load();

})();

</script>
