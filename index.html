function renderTraining(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse on the Stable Roster tab first.</div>'; return wrap; }

  let combinedMode=false;
  let selectedBonuses=new Set();
  let uploadedImage=null;

  function currentHorse(){ return state.horses.find(x=>x.id===card.querySelector('#tr_horse').value); }
  function buildTrainingOpts(h){ return trainingOptionsFor(h).map(t=>`<option value="${t.id}">${t.name}</option>`).join(""); }

  const card=el('div','card');
  card.innerHTML=`
    <h3>Log Training</h3>
    <div class="row">
      <div><label>Horse</label>
        <select id="tr_horse">${state.horses.map(h=>`<option value="${h.id}">${h.name} (${h.stage})</option>`).join("")}</select>
      </div>
      <div style="flex:none;">
        <label>Mode</label>
        <div class="pill-select" style="margin-top:4px;">
          <div class="pill active" id="tr_mode_single">Single</div>
          <div class="pill" id="tr_mode_combined">Combined</div>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label id="tr_lbl1">Training Type</label><select id="tr_type">${buildTrainingOpts(state.horses[0])}</select></div>
      <div id="tr_type2_wrap" style="display:none;"><label>Second Training</label><select id="tr_type2">${buildTrainingOpts(state.horses[0])}</select></div>
    </div>
    <div id="tr_milestone_status"></div>
    <div id="tr_prompt"></div>
    <div style="margin-top:12px;">
      <label>Art Image URL <span class="required">* Required</span></label>
      <p class="small" style="margin:2px 0 6px;">Paste a direct link to the artwork image (not the page it's posted on) — see the note at the top of the page for how to get one.</p>
      <input type="text" id="tr_image_url" placeholder="https://…jpg / .png / .gif" />
      <div id="tr_image_preview" style="margin-top:6px;"></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div>
        <label>Art Type <span class="required">* Required</span></label>
        <select id="tr_art">
          <option value="">— select art type —</option>
          ${Object.keys(ART_EXP).map(k=>`<option value="${k}">${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
        </select>
      </div>
      <div>
        <label>Literature Word Count <span class="small">(optional)</span></label>
        <input type="number" id="tr_lit" min="0" placeholder="e.g. 350 — min 200 for EXP" />
        <div class="small" id="tr_lit_preview" style="margin-top:2px;"></div>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Bonus Elements <span class="small">(optional)</span></label>
      <div class="pill-select" id="tr_bonuses">
        ${Object.keys(BONUS_EXP).map(k=>`<div class="pill" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
      </div>
    </div>
    <div style="margin-top:8px;"><label>Link to Art <span class="small">(optional)</span></label><input id="tr_link" placeholder="https://…" /></div>
    <button id="tr_go" style="margin-top:12px;">✓ Log Training</button>
    <div id="tr_result"></div>
  `;
  wrap.appendChild(card);

  function refreshPrompt(){
    const h=currentHorse();
    const opts=trainingOptionsFor(h);
    const t=opts.find(x=>x.id===card.querySelector('#tr_type').value);
    const t2=combinedMode?opts.find(x=>x.id===card.querySelector('#tr_type2').value):null;
    if(!t) return;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    card.querySelector('#tr_prompt').innerHTML=`<div class="prompt-box">
      ${t2?`<b>${t.name}</b> + <b>${t2.name}</b>`:`<b>${t.name}</b>`}<br>
      <span style="font-size:1.02em;">${t.prompt}${t2?`<br><span style="opacity:.8;">${t2.prompt}</span>`:""}</span><br>
      <span class="small">Stats: ${statsStr}</span>
    </div>`;
  }

  function refreshMilestoneStatus(){
    const h=currentHorse();
    const m=MILESTONES[h.stage];
    const box=card.querySelector('#tr_milestone_status');
    if(!m){ box.innerHTML=''; return; }
    const done=new Set(h.completedMilestones||[]);
    const doneCount=m.options.filter(o=>done.has(o.id)).length;
    const ready=doneCount>=m.required;
    box.innerHTML=`<div class="prompt-box" style="border-color:${ready?'#7a9b6e':'#4a392a'};">
      <b>${h.name}</b> is a <b>${h.stage}</b> — ${doneCount}/${m.required} age-up milestone${m.required>1?'s':''} completed
      ${ready?` · <button id="tr_ageup" style="margin-left:6px;">Age Up to ${m.next}</button>`:''}
    </div>`;
    const btn=box.querySelector('#tr_ageup');
    if(btn) btn.onclick=()=>{
      h.stage=m.next;
      addLog(`${h.name} aged up to ${m.next}!`);
      saveHorse(h); save(); render();
    };
  }

  refreshPrompt();
  refreshMilestoneStatus();
  card.querySelector('#tr_type').onchange=refreshPrompt;
  card.querySelector('#tr_type2').onchange=refreshPrompt;
  card.querySelector('#tr_horse').onchange=()=>{
    const h=currentHorse();
    card.querySelector('#tr_type').innerHTML=buildTrainingOpts(h);
    card.querySelector('#tr_type2').innerHTML=buildTrainingOpts(h);
    refreshPrompt();
    refreshMilestoneStatus();
  };

  card.querySelector('#tr_mode_single').onclick=()=>{
    combinedMode=false;
    card.querySelector('#tr_mode_single').classList.add('active');
    card.querySelector('#tr_mode_combined').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='none';
    card.querySelector('#tr_lbl1').textContent='Training Type';
    refreshPrompt();
  };
  card.querySelector('#tr_mode_combined').onclick=()=>{
    combinedMode=true;
    card.querySelector('#tr_mode_combined').classList.add('active');
    card.querySelector('#tr_mode_single').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='';
    card.querySelector('#tr_lbl1').textContent='First Training';
    refreshPrompt();
  };

  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
  });

  card.querySelector('#tr_lit').oninput=()=>{
    const wc=parseInt(card.querySelector('#tr_lit').value)||0;
    const exp=calcLitExp(wc);
    const prev=card.querySelector('#tr_lit_preview');
    prev.textContent=wc===0?"":(wc<200?"⚠ Min 200 words for EXP":`✓ +${exp} EXP`);
    prev.style.color=wc<200&&wc>0?"#c9a23a":"#7a9b6e";
  };

  // FIX (was the training-entry save bug): this used to read an uploaded
  // file and embed it as base64, which was either too large for the
  // GET/JSONP request or (after compression) still ate into the Sheets
  // cell-size limit. Art images are now pasted links instead — a URL is
  // just a short string, so there's nothing left to compress, chunk, or
  // fail to fit.
  card.querySelector('#tr_image_url').oninput=()=>{
    uploadedImage = card.querySelector('#tr_image_url').value.trim() || null;
  };
  card.querySelector('#tr_image_url').onblur=()=>{
    card.querySelector('#tr_image_preview').innerHTML = urlImagePreviewHTML(uploadedImage, 'Training Art');
  };

  card.querySelector('#tr_go').onclick=async()=>{
    const hId=card.querySelector('#tr_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const tId=card.querySelector('#tr_type').value;
    const tId2=combinedMode?card.querySelector('#tr_type2').value:null;
    const artType=card.querySelector('#tr_art').value;
    const litWords=parseInt(card.querySelector('#tr_lit').value)||0;
    const link=card.querySelector('#tr_link').value.trim();
    const res=card.querySelector('#tr_result');

    if(!uploadedImage){ res.innerHTML='<div class="result fail">An image is required to log training.</div>'; return; }
    if(!artType){ res.innerHTML='<div class="result fail">Please select an art type.</div>'; return; }
    if(combinedMode && tId===tId2){ res.innerHTML='<div class="result fail">Please choose two different training types.</div>'; return; }

    const t=trainingOptionsFor(h).find(x=>x.id===tId);
    const t2=tId2?trainingOptionsFor(h).find(x=>x.id===tId2):null;
    const label=t2?`${t.name} + ${t2.name}`:t.name;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    Object.entries(allStats).forEach(([s,v])=>h.stats[s]=(h.stats[s]||0)+v);

    const m=MILESTONES[h.stage];
    const milestoneIds=[];
    if(m){
      if(!Array.isArray(h.completedMilestones)) h.completedMilestones=[];
      [t,t2].filter(Boolean).forEach(tr=>{
        if(m.options.some(o=>o.id===tr.id)){
          milestoneIds.push(tr.id);
          if(!h.completedMilestones.includes(tr.id)) h.completedMilestones.push(tr.id);
        }
      });
    }

    let expGain=ART_EXP[artType]||0;
    const sources=[`${artType} (+${ART_EXP[artType]})`];
    const litExp=calcLitExp(litWords);
    if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
    selectedBonuses.forEach(k=>{if(BONUS_EXP[k]){expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`);}});
    h.exp+=expGain;
    checkLevelUp(h);

    const trainEntry={id:uid2(),day:state.log.length+1,type:"training",label,art:artType,lit:litWords?`${litWords} words`:null,bonuses:[...selectedBonuses],exp:expGain,link:link||null,image:uploadedImage,statsDelta:allStats,milestoneIds};
    h.artLog.unshift(trainEntry);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    const statsNote=statsStr||"EXP only";
    addLog(`${h.name} — ${label} (${statsNote}) · +${expGain} EXP`);

    res.innerHTML=`<div class="result">⏳ Saving…</div>`;
    // FIX: previously these calls were fired without awaiting or checking
    // their result, so a failed save (still-too-large image, network
    // hiccup) gave no feedback at all — the entry just silently vanished
    // on reload with no error shown.
    const [hOk, entryOk] = await Promise.all([ saveHorse(h), saveArtEntry(h, trainEntry) ]);
    await save();

    if(hOk && entryOk){
      res.innerHTML=`<div class="result success">✓ Training logged & saved! ${statsNote} · +${expGain} EXP (${sources.join(", ")})</div>`;
    } else {
      res.innerHTML=`<div class="result fail">⚠ Training was recorded here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.</div>`;
    }

    uploadedImage=null;
    card.querySelector('#tr_image_preview').innerHTML='';
    card.querySelector('#tr_image_url').value='';
    card.querySelector('#tr_lit').value='';
    card.querySelector('#tr_lit_preview').textContent='';
    card.querySelector('#tr_link').value='';
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
    refreshMilestoneStatus();
  };

  return wrap;
}

    </div>

      <input id="cs_link" placeholder="https://… (DeviantArt, Toyhouse, etc.)" />
    </div>` : ""}

    <hr style="border:none;border-top:1px solid #4a392a;margin:14px 0;" />

    <label>Prizes, Ribbons & Trophies <span class="small">(add as many as you like)</span></label>
    <p class="small" style="margin:2px 0 6px;">Paste direct image links for your ribbons, trophies, sashes, prize tack, or any awards from this show. Each gets a label.</p>
    <div id="cs_prize_area"></div>
    <button id="cs_add_prize" class="secondary" style="margin-top:6px;font-size:1.02em;">+ Add Prize / Ribbon</button>

    <hr style="border:none;border-top:1px solid #4a392a;margin:14px 0;" />

    <button id="cs_go" style="width:100%;margin-top:4px;">✓ Save Show Record</button>
    <div id="cs_result"></div>
  `;
  wrap.appendChild(card);

  card.querySelector('#cs_disc').onchange=()=>{
    const disc=card.querySelector('#cs_disc').value;
    card.querySelector('#cs_class').placeholder=`e.g. ${DISCIPLINES[disc]?.difficulties?.[0]||'Open'}`;
  };

  if(card.querySelector('#cs_lit')){
    card.querySelector('#cs_lit').oninput=()=>{
      const wc=parseInt(card.querySelector('#cs_lit').value)||0;
      const prev=card.querySelector('#cs_lit_preview');
      prev.textContent=wc===0?"":(wc<200?"⚠ Min 200 words":`✓ +${calcLitExp(wc)} EXP`);
      prev.style.color=wc<200&&wc>0?"#c9a23a":"#7a9b6e";
    };
  }

  const selectedBonuses=new Set();
  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
  });

  // FIX (this was the show-art part of the bug): show art photos were
  // almost always full-res phone/screenshot uploads, embedded as base64,
  // which blew past the GET/JSONP request size and/or the Sheets cell
  // limit and failed the whole show record's save. Now it's a pasted link
  // instead — just a short string, nothing to compress or chunk.
  card.querySelector('#cs_art_url').oninput=()=>{
    artImage = card.querySelector('#cs_art_url').value.trim() || null;
  };
  card.querySelector('#cs_art_url').onblur=()=>{
    card.querySelector('#cs_art_preview').innerHTML = urlImagePreviewHTML(artImage, 'Show Art');
  };

  function refreshPrizeArea(){
    const area=card.querySelector('#cs_prize_area');
    area.innerHTML=prizeImages.length ? prizeImages.map((p,i)=>`
      <div style="display:flex;align-items:flex-start;gap:8px;padding:8px;background:#15100c;border-radius:6px;margin-bottom:6px;">
        <div data-prize-thumb="${i}">${prizeThumbHTML(p.dataUrl)}</div>
        <div style="flex:1;">
          <input data-prize-url="${i}" value="${p.dataUrl||''}" placeholder="Direct image URL (https://…jpg)"
            style="width:100%;padding:5px;background:#1b1410;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;box-sizing:border-box;margin-bottom:4px;" />
          <input data-prize-label="${i}" value="${p.label||''}" placeholder="e.g. 1st Place Ribbon, Championship Trophy, Prize Saddle Pad…"
            style="width:100%;padding:5px;background:#1b1410;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;box-sizing:border-box;" />
        </div>
        <button data-remove-prize="${i}" class="danger" style="font-size:.98em;padding:3px 8px;flex:none;">✕</button>
      </div>`).join("") : '<div class="small" style="color:#5a4a3a;padding:4px 0;">No prizes added yet.</div>';

    area.querySelectorAll('[data-prize-label]').forEach(inp=>{
      inp.oninput=()=>{ prizeImages[Number(inp.dataset.prizeLabel)].label=inp.value; };
    });
    // FIX (prize photo part of the bug): prize/ribbon photos were uploaded
    // files embedded as base64 — same problem as show art above, and there
    // were often several per show, compounding it. Now pasted links; the
    // thumbnail only re-renders on blur (not every keystroke) so typing in
    // the field doesn't lose focus.
    area.querySelectorAll('[data-prize-url]').forEach(inp=>{
      inp.oninput=()=>{ prizeImages[Number(inp.dataset.prizeUrl)].dataUrl=inp.value.trim(); };
      inp.onblur=()=>{
        const i=Number(inp.dataset.prizeUrl);
        const thumb=area.querySelector(`[data-prize-thumb="${i}"]`);
        if(thumb) thumb.innerHTML=prizeThumbHTML(prizeImages[i].dataUrl);
      };
    });
    area.querySelectorAll('[data-remove-prize]').forEach(b=>{
      b.onclick=()=>{ prizeImages.splice(Number(b.dataset.removePrize),1); refreshPrizeArea(); };
    });
  }
  refreshPrizeArea();

  card.querySelector('#cs_add_prize').onclick=()=>{
    prizeImages.push({dataUrl:"", label:""});
    refreshPrizeArea();
  };

  card.querySelector('#cs_go').onclick=async()=>{
    const hId=card.querySelector('#cs_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const disc=card.querySelector('#cs_disc').value;
    const venue=card.querySelector('#cs_venue').value.trim();
    const date=card.querySelector('#cs_date').value.trim();
    const placement=Number(card.querySelector('#cs_place').value)||null;
    const className=card.querySelector('#cs_class').value.trim();
    const note=card.querySelector('#cs_note').value.trim();
    const artType=card.querySelector('#cs_art_type')?.value||"";
    const litWords=parseInt(card.querySelector('#cs_lit')?.value)||0;
    const link=card.querySelector('#cs_link')?.value.trim()||"";
    const res=card.querySelector('#cs_result');
    res.innerHTML=`<div class="result">⏳ Saving…</div>`;

    let expGain=0;
    let nonPlacementExp=0;
    const sources=[];
    const discStats={};
    if(artType && ART_EXP[artType]){
      expGain+=ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`);
      const litExp=calcLitExp(litWords);
      if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
      expGain+=1; sources.push(`Show Entry (+1)`);
      selectedBonuses.forEach(k=>{if(BONUS_EXP[k]){expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`);}});
      nonPlacementExp=expGain;
      const placeExp={1:4,2:3,3:2}[placement]||1;
      if(placement){expGain+=placeExp; sources.push(`Placement (+${placeExp})`);}
      h.exp+=expGain;
      checkLevelUp(h);
      if(disc && DISCIPLINES[disc]?.stats) DISCIPLINES[disc].stats.forEach(s=>{ h.stats[s]=(h.stats[s]||0)+1; discStats[s]=(discStats[s]||0)+1; });
    }

    let artLogId=null;
    let artSavePromise=Promise.resolve(true);
    if(artImage && artType){
      artLogId=uid2();
      const artEntry={id:artLogId,day:state.log.length+1,type:"competition",label:`${disc}${venue?" — "+venue:""}`,
        placement,art:artType,lit:litWords?`${litWords} words`:null,
        bonuses:[...selectedBonuses],exp:expGain,link:link||null,image:artImage,
        statsDelta:discStats,nonPlacementExp,discipline:disc};
      h.artLog.unshift(artEntry);
      artSavePromise = saveArtEntry(h, artEntry); // don't await yet — runs alongside saveHorse below
    }

    if(!h.compHistory) h.compHistory=[];
    const rec={
      id:uid2(), discipline:disc, difficulty:className, venue, date,
      placement, note, image:artImage||null, link:link||null,
      prizes:[...prizeImages], artLogId,
    };
    h.compHistory.unshift(rec);

    const placeLabel=placement?["1st","2nd","3rd","4th","5th","6th"][placement-1]||placement+"th":"Participant";
    addLog(`${h.name} — ${disc}${venue?" at "+venue:""} · ${placeLabel}${expGain?` · +${expGain} EXP`:""}`);

    // FIX: previously fired without awaiting/checking, so a failed save
    // (oversized payload, network hiccup) never surfaced to the user —
    // the whole show record just quietly failed to persist. Also now runs
    // alongside the art log entry's save (above) instead of after it.
    const [entryOk, hOk] = await Promise.all([artSavePromise, saveHorse(h)]);
    await save();

    if(hOk && entryOk){
      res.innerHTML=`<div class="result success">✓ Show logged & saved!${expGain?` +${expGain} EXP (${sources.join(", ")})`:""} ${prizeImages.length?`${prizeImages.length} prize(s) saved.`:""}</div>`;
    } else {
      res.innerHTML=`<div class="result fail">⚠ Show was recorded here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.<br><span class="small">(Open your browser's console — F12 or right-click → Inspect → Console — for the specific error, tagged "[EquiStories save failed]".)</span></div>`;
    }

    artImage=null; prizeImages.length=0;
    card.querySelector('#cs_art_preview').innerHTML='';
    card.querySelector('#cs_art_url').value='';
    ['#cs_venue','#cs_date','#cs_note','#cs_class','#cs_link'].forEach(s=>{ const el=card.querySelector(s); if(el)el.value=''; });
    card.querySelector('#cs_place').value='';
    if(card.querySelector('#cs_art_type')) card.querySelector('#cs_art_type').value='';
    if(card.querySelector('#cs_lit')){ card.querySelector('#cs_lit').value=''; card.querySelector('#cs_lit_preview').textContent=''; }
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
    refreshPrizeArea();
  };

  return wrap;
}

function buildShowHistory(){
  const wrap=el('div');

  // Claim a show ribbon: paste a code from EquiStories Shows to hang a ribbon on
  // the horse you entered. Uses the normal saveHorse path — same as a local show.
  const claim=el('div');
  claim.style.cssText='margin-bottom:16px;padding:12px;border:1px solid #4a392a;border-radius:8px;background:#1c1510;';
  claim.innerHTML=`
    <div class="small" style="color:#b5a392;margin-bottom:6px;">Claim a show ribbon</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <input id="ribbon_claim_code" type="text" placeholder="Paste the claim code from a show" style="flex:1;min-width:220px;" />
      <button id="ribbon_claim_btn" class="btn">Add to horse</button>
    </div>
    <div id="ribbon_claim_msg" class="small" style="margin-top:6px;color:#5a4a3a;"></div>`;
  wrap.appendChild(claim);
  claim.querySelector('#ribbon_claim_btn').onclick=async()=>{
    const msg=claim.querySelector('#ribbon_claim_msg');
    const raw=(claim.querySelector('#ribbon_claim_code').value||'').trim();
    if(!raw){ msg.textContent='Paste a claim code first.'; return; }
    let data;
    try{
      const b64=raw.replace(/-/g,'+').replace(/_/g,'/');
      data=JSON.parse(decodeURIComponent(escape(atob(b64))));
    }catch(e){ msg.style.color='#b5533a'; msg.textContent='That code could not be read.'; return; }
    if(!data || data.v!==1 || !data.horseId || !data.rec){ msg.style.color='#b5533a'; msg.textContent='That is not a ribbon claim code.'; return; }
    const h=state.horses.find(x=>x.id===data.horseId);
    if(!h){ msg.style.color='#b5533a'; msg.textContent='That ribbon is for a horse not in your stable. Are you signed into the right account?'; return; }
    if(!h.compHistory) h.compHistory=[];
    if(h.compHistory.some(r=>r.id===data.rec.id)){ msg.style.color='#b5533a'; msg.textContent='This ribbon is already on '+h.name+'.'; return; }
    h.compHistory.unshift(data.rec);
    msg.style.color='#7a9b6e'; msg.textContent='Adding to '+h.name+'…';
    const ok=await saveHorse(h);
    await save();
    if(ok){
      addLog(`${h.name} received a ribbon: ${data.rec.difficulty}${data.rec.venue?' at '+data.rec.venue:''}`);
      msg.textContent=`Ribbon added to ${h.name}'s wall.`;
      claim.querySelector('#ribbon_claim_code').value='';
      showMode('history');
    } else {
      h.compHistory=h.compHistory.filter(r=>r.id!==data.rec.id);
      msg.style.color='#b5533a'; msg.textContent='Could not save. Try again.';
    }
  };

  state.horses.forEach(h=>{
    const history=h.compHistory||[];
    if(!history.length) return;
    const trophies=history.filter(c=>c.placement>=1&&c.placement<=3);
    const allPrizeImages=trophies.flatMap(c=>(c.prizes||[]).map(p=>({...p, discipline:c.discipline, placeStr:["1st","2nd","3rd"][c.placement-1]})));
    const card=el('div','card');

    const ribbonWallHtml=allPrizeImages.length?`
      <div style="margin-bottom:14px;">
        <div class="small" style="margin-bottom:6px;color:#b5a392;">Ribbon Wall</div>
        <div style="display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;">
          ${allPrizeImages.map(p=>`<img src="${p.dataUrl}" style="width:280px;height:280px;object-fit:contain;cursor:zoom-in;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||(p.discipline+' — '+p.placeStr))}')" onerror="this.style.display='none'" />`).join("")}
        </div>
      </div>`:
      `<div class="small" style="color:#5a4a3a;margin-bottom:10px;">No top-3 placements yet.</div>`;

    card.innerHTML=`
      <h3>${h.name}
        <span class="tag">${history.length} shows</span>
        <span class="tag" style="background:rgba(201,138,58,.15);color:#c98a3a;border-color:#c98a3a;">${trophies.length} </span>
      </h3>
      ${ribbonWallHtml}
      <div class="small" style="margin-bottom:6px;color:#b5a392;">Full Show History</div>
      <div class="artlog-panel" style="max-height:400px;">
        ${history.map(c=>{
          const pl=c.placement;
          const icon=pl===1?"":pl===2?"":pl===3?"":pl?"":"";
          const placeLabel=pl?["1st","2nd","3rd","4th","5th","6th"][pl-1]||pl+"th":"Participant";
          const prizes=c.prizes||[];
          return `<div class="artlog-entry">
            <div style="display:flex;gap:8px;align-items:flex-start;">
              ${c.image?`<img src="${c.image}" class="artlog-thumb" style="cursor:zoom-in;" onclick="openLightbox('${jsStr(c.image)}','${jsStr(c.discipline)}')" onerror="this.style.display='none'" />`:""}
              <div style="flex:1;">
                ${icon} <b>${c.discipline}</b>${c.difficulty?` — ${c.difficulty}`:""} <span class="tag">${placeLabel}</span>
                ${c.venue?`<div class="small">${c.venue}${c.date?` · ${c.date}`:""}</div>`:(c.date?`<div class="small">${c.date}</div>`:"")}
                ${c.note?`<div class="small" style="opacity:.8;">${c.note}</div>`:""}
                ${prizes.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
                  ${prizes.map(p=>`<div style="text-align:center;">
                    <img src="${p.dataUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid #4a392a;cursor:zoom-in;display:block;" onclick="openLightbox('${jsStr(p.dataUrl)}','${jsStr(p.label||'Prize')}')" onerror="this.style.display='none'" />
                  </div>`).join("")}
                </div>`:""}
                <button data-act="edit-show" data-hid="${h.id}" data-cid="${c.id}" class="secondary" style="font-size:.96em;padding:2px 7px;margin-top:6px;">Edit Placement / Prizes</button>
                <button data-act="del-show" data-hid="${h.id}" data-cid="${c.id}" class="secondary" style="font-size:.96em;padding:2px 7px;margin-top:6px;">✕ Remove</button>
              </div>
            </div>
          </div>`;
        }).join("")}
      </div>
    `;
    wrap.appendChild(card);
  });

  if(!state.horses.some(h=>(h.compHistory||[]).length)){
    wrap.innerHTML='<div class="card small">No shows logged yet — use Log a Show to add your first record.</div>';
  }

  wrap.querySelectorAll('[data-act="del-show"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this show record? This will reverse its EXP and stat gains.')) return;
    const h=state.horses.find(x=>x.id===b.dataset.hid);
    if(h) deleteCompRecord(h, b.dataset.cid);
  });
  wrap.querySelectorAll('[data-act="edit-show"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.hid);
    if(h) showEditCompModal(h, b.dataset.cid);
  });

  return wrap;
}

function showEditCompModal(h, recId){
  const rec=(h.compHistory||[]).find(r=>r.id===recId);
  if(!rec) return;
  const newPrizes=[];

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:480px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">
    <h3 style="margin-top:0;color:#c98a3a;">Edit Show — ${rec.discipline}${rec.venue?` (${rec.venue})`:""}</h3>
    <label>Placement</label>
    <select id="ec_place" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:10px;">
      <option value="">— Not yet judged / no placement —</option>
      ${["1st","2nd","3rd","4th","5th","6th"].map((l,i)=>`<option value="${i+1}" ${rec.placement===i+1?"selected":""}>${l}</option>`).join("")}
    </select>
    <label>Add Prize Photo URL(s)</label>
    <p class="small" style="margin:2px 0 6px;color:#b5a392;">Paste a direct image link, click Add, repeat for more. See the note at the top of the page for how to get one.</p>
    <div style="display:flex;gap:6px;margin-bottom:6px;">
      <input type="text" id="ec_prize_url" placeholder="https://…jpg / .png / .gif" style="flex:1;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;" />
      <button id="ec_prize_add" style="padding:7px 14px;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;border-radius:5px;cursor:pointer;">Add</button>
    </div>
    <div id="ec_prize_preview" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;"></div>
    ${rec.artLogId?`<p class="small" style="color:#b5a392;">This show has art logged — changing the placement will recalculate its EXP and your horse's stats/level.</p>`:`<p class="small" style="color:#b5a392;">No art was logged for this show, so there's no EXP to recalculate — this just updates the record.</p>`}
    <button id="ec_save" style="margin-top:8px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;">Save</button>
    <button id="ec_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:10px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#ec_prize_add').onclick=()=>{
    const inp=overlay.querySelector('#ec_prize_url');
    const url=inp.value.trim();
    if(!url) return;
    newPrizes.push({dataUrl:url, label:""});
    inp.value='';
    overlay.querySelector('#ec_prize_preview').innerHTML=newPrizes.map(p=>prizeThumbHTML(p.dataUrl)).join("");
  };

  overlay.querySelector('#ec_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#ec_save').onclick=async()=>{
    const newPlacement=Number(overlay.querySelector('#ec_place').value)||null;
    rec.placement=newPlacement;
    if(newPrizes.length) rec.prizes=[...(rec.prizes||[]), ...newPrizes];

    let entryOk = true;
    if(rec.artLogId){
      const entry=(h.artLog||[]).find(x=>x.id===rec.artLogId);
      if(entry && entry.nonPlacementExp!==undefined){
        entry.placement=newPlacement;
        const placeExp = newPlacement ? ({1:4,2:3,3:2}[newPlacement]||1) : 0;
        entry.exp = entry.nonPlacementExp + placeExp;
        // FIX: this updated the in-memory art log entry, but saveHorse()
        // never touches the ArtLog sheet — without resaving the entry
        // itself, the new EXP/placement only lived until the next reload.
        entryOk = await saveArtEntry(h, entry);
      }
    }
    recomputeHorse(h);
    addLog(`Updated show record for ${h.name} — ${rec.discipline}.`);
    const ok = await saveHorse(h) && entryOk;
    await save();
    overlay.remove();
    render();
    if(!ok) alert(`The edit was applied here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
  };
}


function renderArtLog(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse first.</div>'; return wrap; }

  state.horses.forEach(h=>{
    if(!h.artLog.length) return;
    const card=el('div','card');
    card.innerHTML=`<h3>${h.name} <span class="tag">Lvl ${h.level}</span> <span class="tag">${h.artLog.length} entries</span></h3>
    <div class="artlog-panel" style="max-height:400px;">
      ${h.artLog.map(e=>{
        const placeLabel=e.placement?["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||"":null;
        return `<div class="artlog-entry">
          <div style="display:flex;gap:10px;align-items:flex-start;">
            ${e.image?`<img src="${e.image}" class="artlog-thumb" style="flex:none;" />`:""}
            <div style="flex:1;">
              <b>${e.label}</b>
              ${placeLabel?`<span class="tag">${placeLabel}</span>`:""}
              <span class="tag" style="background:rgba(122,155,110,.15);color:#7a9b6e;border-color:#7a9b6e;">+${e.exp} EXP</span>
              <span data-act="edit-artlog-img" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:#c98a3a;font-size:.92em;margin-left:6px;font-weight:bold;" title="Replace this entry's image link">Edit image</span><span data-act="delete-artlog" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:#c96a3a;font-size:.92em;margin-left:6px;font-weight:bold;" title="Delete this entry (reverses its EXP/stats)">✕ Delete</span>
              ${e.link?`<a href="${e.link}" target="_blank" class="artlog-link" style="font-size:1em;margin-left:4px;"></a>`:""}
              <div class="small" style="margin-top:2px;">${[e.art,e.lit,...(e.bonuses||[])].filter(Boolean).join(" · ")}</div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
    wrap.appendChild(card);
  });

  if(!state.horses.some(h=>h.artLog.length)){
    wrap.innerHTML='<div class="card small">No art logged yet — use the Training or Competitions tabs to add entries.</div>';
  }

  wrap.querySelectorAll('[data-lightbox]').forEach(img=>{
    img.onclick=e=>{ e.stopPropagation(); openLightbox(img.dataset.lightbox, img.dataset.caption); };
  });
  wrap.querySelectorAll('[data-act="edit-artlog-img"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id);
    if(h) editArtLogImage(h, b.dataset.entry);
  });
  wrap.querySelectorAll('[data-act="delete-artlog"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id);
    if(!h) return;
    if(!confirm('Delete this log entry? This will reverse its EXP and stat gains.')) return;
    deleteArtLogEntry(h, b.dataset.entry);
  });

  return wrap;
}

function renderTackInventory(){
  const wrap=el('div');

  const form=el('div','card',`
    <h3>Add Tack Item</h3>
    <p class="small" style="margin-top:0;">Add tack to your shared inventory. Then equip pieces on individual horses from their roster card.</p>
    <div class="row">
      <div><label>Item Name</label><input id="tk_name" placeholder="e.g. XC Saddle, Egg-bar Shoes" /></div>
      <div><label>Category</label>
        <select id="tk_cat">
          <option>Saddle</option><option>Bridle</option><option>Shoes</option>
          <option>Boots</option><option>Blanket</option><option>Other</option>
        </select>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Item Image</label>
      <input type="text" id="tk_image_url" placeholder="Paste a direct link to the item photo (.jpg/.png/.gif)" style="width:100%;max-width:420px;" />
      <div id="tk_image_preview" style="margin-top:6px;"></div>
    </div>
    <div style="margin-top:8px;">
      <label>Stat Bonuses While Equipped <span class="small">(optional)</span></label>
      <div class="row">
        ${STATS.map(s=>`<div style="min-width:90px;"><label style="font-size:.96em;">${STAT_LABELS[s]}</label><input type="number" id="tk_stat_${s}" value="0" style="padding:4px 6px;" /></div>`).join("")}
      </div>
    </div>
    <button id="tk_add" style="margin-top:10px;">+ Add to Inventory</button>
  `);
  wrap.appendChild(form);

  let tackImage=null;
  // FIX: tack item photos are saved as part of state.tackInventory in the
  // same synced payload as everything else, so a file upload here (even
  // resized) could still push that whole save over the JSONP/Sheets size
  // limit. Now a pasted direct image link, same as the rest of the app.
  form.querySelector('#tk_image_url').oninput=()=>{
    tackImage = form.querySelector('#tk_image_url').value.trim() || null;
    form.querySelector('#tk_image_preview').innerHTML = urlImagePreviewHTML(tackImage, 'Tack Item');
  };

  form.querySelector('#tk_add').onclick=async()=>{
    const name=form.querySelector('#tk_name').value.trim();
    if(!name){ alert("Give the tack item a name first!"); return; }
    const cat=form.querySelector('#tk_cat').value;
    const stats={};
    STATS.forEach(s=>{
      const v=Number(form.querySelector(`#tk_stat_${s}`).value)||0;
      if(v!==0) stats[s]=v;
    });
    const item={ id:uid2(), name, category:cat, image:tackImage, stats };
    if(!state.tackInventory) state.tackInventory=[];
    state.tackInventory.push(item);
    addLog(`Added "${name}" (${cat}) to the tack inventory.`);
    tackImage=null;
    await save(); render();
  };

  const inv = state.tackInventory||[];
  const invCard=el('div','card');
  invCard.innerHTML=`<h3>Owned Tack (${inv.length})</h3>`;
  if(!inv.length){
    invCard.innerHTML+=`<div class="small">No tack added yet.</div>`;
  } else {
    const grid=el('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px;';
    inv.forEach(item=>{
      const statsStr=Object.entries(item.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
      const div=el('div');
      div.style.cssText='background:#15100c;border:1px solid #4a392a;border-radius:8px;padding:8px;text-align:center;';
      div.innerHTML=`
        ${item.image?`<img src="${item.image}" style="width:100%;height:90px;object-fit:cover;border-radius:5px;" />`:`<div style="height:90px;display:flex;align-items:center;justify-content:center;font-size:2em;color:#4a392a;"></div>`}
        <div style="margin-top:6px;font-weight:bold;font-size:1.04em;">${item.name}</div>
        <div class="small">${item.category}</div>
        ${statsStr?`<div class="small" style="color:var(--good);margin-top:2px;">${statsStr}</div>`:""}
        <button class="danger" data-act="del-tack" data-id="${item.id}" style="font-size:.96em;padding:3px 8px;margin-top:6px;">Remove</button>
      `;
      grid.appendChild(div);
    });
    invCard.appendChild(grid);
  }
  wrap.appendChild(invCard);

  invCard.querySelectorAll('[data-act="del-tack"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this tack item from inventory? It will be unequipped from any horses wearing it.')) return;
    state.tackInventory=(state.tackInventory||[]).filter(t=>t.id!==b.dataset.id);
    const affectedIds=[];
    state.horses.forEach(h=>{
      if((h.tackEquipped||[]).includes(b.dataset.id)) affectedIds.push(h.id);
      h.tackEquipped=(h.tackEquipped||[]).filter(id=>id!==b.dataset.id);
    });
    save(affectedIds); render();
  });

  return wrap;
}

let editingBreedId = null;
let editingGeneId = null;
let editingMarkingId = null;
let editingMutationId = null;

      </label>

    <h4 style="margin:14px 0 4px;color:var(--accent);">ILB Exclusive Genetics</h4>
    <div class="loci-check-grid">
      ${ilbLoci.map(l=>`
        <label class="small" title="${l.label.replace(/"/g,"&quot;")}">
          <input type="checkbox" data-loci="${l.key}" ${editing&&editing.loci.includes(l.key)?"checked":""} /> <span>${shortLocusLabel(l)}</span>

        <label class="small" title="${l.label.replace(/"/g,"&quot;")}">
          <input type="checkbox" data-loci="${l.key}" ${editing&&editing.loci.includes(l.key)?"checked":""} /> <span>${shortLocusLabel(l)}</span>

  form.querySelector('#ad_save_breed').onclick=async()=>{

    const dupe=state.customBreeds.find(b=>b.name.toLowerCase()===name.toLowerCase() && b.id!==editingBreedId);

    const ok=await saveGlobalBreeds();
    status.textContent = ok ? 'Saved — visible to all affiliates now.' : '⚠ Saved here, but failed to sync to Stable Data. Try again.';

  const cancelBtn=form.querySelector('#ad_cancel_edit');

  } else {
    breeds.forEach(b=>{
      const row=el('div');
      row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #2c2118;';
      const lociLabels=b.loci.map(k=>{ const l=allLoci().find(x=>x.key===k); return l?l.label.split(" — ")[0].split(" (")[0]:k; }).join(", ");
      row.innerHTML=`
        <div style="flex:1;">
          <div style="font-weight:bold;">${b.name}</div>
          <div class="small" style="opacity:.8;">${lociLabels||"No extra genetics enabled"}</div>

      `;
      listCard.appendChild(row);
    });
  }
  wrap.appendChild(listCard);

    const target=state.customBreeds.find(x=>x.id===b.dataset.remove);

    state.customBreeds=(state.customBreeds||[]).filter(x=>x.id!==b.dataset.remove);
    await saveGlobalBreeds();
    render();
  });

  // ============================================
  // ADMIN — CUSTOM GENES
  // (arbitrary user-defined loci that can be attached to any Custom/Created
  // breed above, alongside the built-in Common/ILB Exclusive genetics)
  // ============================================

  const editingGene = editingGeneId ? (state.customGenes||[]).find(g=>g.id===editingGeneId) : null;

  const geneForm = el('div','card',`
    <h3>${editingGene?`Edit Custom Gene — ${editingGene.label}`:"Add Custom Gene"}</h3>
    <p class="small" style="margin:0 0 8px;">Define a brand-new gene locus — with its own alleles and Net Worth pricing — that can be attached to any Custom/Created breed above.</p>
    <label>Gene Name</label>
    <input id="ag_gene_label" placeholder="e.g. Glimmer Coat (Gl)" value="${editingGene?editingGene.label.replace(/"/g,"&quot;"):""}" style="max-width:320px;" />

    <h4 style="margin:14px 0 4px;color:var(--accent);">Alleles / Outcomes</h4>
    <p class="small" style="margin:0 0 8px;">One row per possible genotype at this locus (e.g. "no gene", "carrier", "homozygous"). Give each a short code, a display description, and the Net Worth it adds when expressed.</p>
    <div id="ag_option_rows"></div>
    <button id="ag_add_row" class="secondary" style="margin-top:4px;">+ Add Allele</button>

    <div style="margin-top:14px;">
      <button id="ag_save_gene">${editingGene?"Save Changes":"Add Gene"}</button>
      ${editingGene?`<button id="ag_cancel_gene" class="secondary">Cancel</button>`:""}
    </div>
    <div id="ag_save_status" class="small" style="margin-top:6px;"></div>
  `);
  wrap.appendChild(geneForm);

  let geneOptionRows = editingGene ? editingGene.options.map(o=>({...o})) : [{code:"",desc:"",price:0}];

  function refreshGeneOptionRows(){
    const rowsWrap = geneForm.querySelector('#ag_option_rows');
    rowsWrap.innerHTML = geneOptionRows.map((o,i)=>`
      <div class="row" style="align-items:flex-end;margin-bottom:6px;" data-row="${i}">
        <div style="max-width:140px;"><label>Code</label><input data-field="code" value="${(o.code||"").replace(/"/g,"&quot;")}" placeholder="e.g. glgl" /></div>
        <div style="flex:2;"><label>Description</label><input data-field="desc" value="${(o.desc||"").replace(/"/g,"&quot;")}" placeholder="e.g. No Glimmer Coat" /></div>
        <div style="max-width:120px;"><label>Price (฿)</label><input data-field="price" type="number" value="${o.price||0}" /></div>
        <div><button data-remove-row="${i}" class="danger" style="padding:9px 12px;margin-top:0;">✕</button></div>
      </div>`).join("");
    rowsWrap.querySelectorAll('[data-row]').forEach(rowEl=>{
      const idx=Number(rowEl.dataset.row);
      rowEl.querySelectorAll('[data-field]').forEach(inp=>{
        inp.oninput=()=>{

          geneOptionRows[idx][field] = field==="price" ? Number(inp.value)||0 : inp.value;
        };
      });
    });
    rowsWrap.querySelectorAll('[data-remove-row]').forEach(b=>b.onclick=()=>{
      if(geneOptionRows.length<=1){ alert("A gene needs at least one allele row."); return; }
      geneOptionRows.splice(Number(b.dataset.removeRow),1);
      refreshGeneOptionRows();
    });

  refreshGeneOptionRows();

  geneForm.querySelector('#ag_add_row').onclick=()=>{
    geneOptionRows.push({code:"",desc:"",price:0});
    refreshGeneOptionRows();
  };

  geneForm.querySelector('#ag_save_gene').onclick=async()=>{
    const label=geneForm.querySelector('#ag_gene_label').value.trim();
    if(!label){ alert("Give the gene a name first."); return; }

      .filter(o=>(o.code||"").trim() && (o.desc||"").trim())
      .map(o=>({code:o.code.trim(), desc:o.desc.trim(), price:Number(o.price)||0}));

    if(editingGene){
      editingGene.label=label; editingGene.options=options;

      const key=slugifyGeneKey(label, state.customGenes);

    render();

          ${usedBy.length?`<div class="small" style="opacity:.6;">Used by: ${usedBy.join(", ")}</div>`:""}
        </div>
        <button class="secondary" data-edit-gene="${g.id}" style="font-size:.96em;padding:3px 10px;margin-top:0;">Edit</button>
        <button class="danger" data-remove-gene="${g.id}" style="font-size:.96em;padding:3px 10px;margin-top:0;">Remove</button>
      `;
      geneListCard.appendChild(row);
    });

  wrap.appendChild(geneListCard);

  geneListCard.querySelectorAll('[data-edit-gene]').forEach(b=>b.onclick=()=>{

    render();
    window.scrollTo(0,0);
  });
  geneListCard.querySelectorAll('[data-remove-gene]').forEach(b=>b.onclick=async()=>{
    const target=state.customGenes.find(x=>x.id===b.dataset.removeGene);
    if(!confirm(`Remove custom gene "${target?.label}"? It'll be unchecked from any breeds using it and disappear from the gene picker (horses already carrying it keep their saved Net Worth value).`)) return;
    state.customGenes=(state.customGenes||[]).filter(x=>x.id!==b.dataset.removeGene);
    // Also strip the removed gene's key from every breed's loci list so the
    // breed editor above doesn't show a stray checkmark for a gene that no
    // longer exists.
    (state.customBreeds||[]).forEach(br=>{ br.loci=(br.loci||[]).filter(k=>k!==target?.key); });
    await saveGlobalBreeds();
    render();
  });

  // ============================================
  // ADMIN — CUSTOM RARE MARKINGS
  // (arbitrary user-defined entries added to the "Rare Markings" group in
  // the marking/trait picker on the Roster tab — universal, available on
  // every horse regardless of breed, same as the built-in Rare Markings)
  // ============================================

  const editingMarking = editingMarkingId ? (state.customMarkings||[]).find(m=>m.id===editingMarkingId) : null;
  const {common:markingCommonBreeds, custom:markingCustomBreeds} = getBreedOptionGroups();
  const editingMarkingBreeds = (editingMarking?.breeds||[]).map(b=>b.toLowerCase());

  const markingForm = el('div','card',`
    <h3>${editingMarking?`Edit Custom Rare Marking — ${editingMarking.label}`:"Add Custom Rare Marking"}</h3>
    <p class="small" style="margin:0 0 8px;">Shows up under "— Rare Markings —" in the marking/trait picker on the Roster tab for every affiliate, alongside the built-in list.</p>
    <div class="row" style="align-items:flex-end;">
      <div style="flex:2;"><label>Marking Name</label><input id="am_label" placeholder="e.g. Cryptic" value="${editingMarking?editingMarking.label.replace(/"/g,"&quot;"):""}" /></div>
      <div style="max-width:140px;"><label>Price (฿)</label><input id="am_price" type="number" min="0" value="${editingMarking?editingMarking.value:0}" /></div>

      ${markingCommonBreeds.map(b=>`

      ${markingCustomBreeds.map(b=>`
        <label class="small" title="${b.name.replace(/"/g,"&quot;")} (Custom/Created)">
          <input type="checkbox" data-marking-breed="${b.name.toLowerCase()}" ${editingMarkingBreeds.includes(b.name.toLowerCase())?"checked":""} /> <span>${b.name}</span>
        </label>`).join("")}
    </div>

    <div style="margin-top:14px;">
      <button id="am_save_marking">${editingMarking?"Save Changes":"Add Marking"}</button>
      ${editingMarking?`<button id="am_cancel_marking" class="secondary">Cancel</button>`:""}
    </div>
    <div id="am_save_status" class="small" style="margin-top:6px;"></div>

  markingForm.querySelector('#am_save_marking').onclick=async()=>{
    const label=markingForm.querySelector('#am_label').value.trim();
    const value=Number(markingForm.querySelector('#am_price').value)||0;

    if(!label){ alert("Give the marking a name first."); return; }
    if(!state.customMarkings) state.customMarkings=[];
    const dupe=state.customMarkings.find(m=>m.label.toLowerCase()===label.toLowerCase() && m.id!==editingMarkingId)
      || GENO_MODIFIERS["Rare Markings"].find(m=>m.label.toLowerCase()===label.toLowerCase());
    if(dupe){ alert("A rare marking with that name already exists."); return; }
    if(editingMarking){

// gene — Bloodmark is documented as a marking that only shows up on grey
// horses, and the Peacock Appaloosa Mutation only occurs on Leopard
// Complex (Lp) horses. Rather than letting them be picked on a horse that
// can't carry them, they're filtered out of the marking picker unless the
// prerequisite gene is present. Keyed by marking label -> the locus and
// the set of allele codes at that locus that satisfy the requirement.
const MARKING_GENE_REQUIREMENTS = {
  "Bloodmark": {locus:"grey", codes:["Gg","GG"]},
  "Peacock Appaloosa Mutation": {locus:"leopard", codes:["nLp","LpLp"]},
};
// hasCodeFn(locus, code) -> boolean; callers supply different lookups
// depending on whether they have live selections (the Add-a-Horse form)
// or only a saved horse's genotype string (the Net Worth modal).
function markingMeetsGeneRequirement(label, hasCodeFn){
  const req = MARKING_GENE_REQUIREMENTS[label];
  if(!req) return true;
  return req.codes.some(c=>hasCodeFn(req.locus, c));
}

// Custom genes are defined by affiliates via Admin > Custom Genes, stored in
// state.customGenes as {id, key, label, options:[{code,desc,price}]}. This
// wraps each one in the same shape as an entry in GENETIC_LOCI (a simple
// optional locus, no requiresAny/base flags) so every place that reads
// GENETIC_LOCI can instead read allLoci() and treat built-in and custom
// genes identically — same gene grid, same Net Worth pricing, same breed
// attach/detach checkboxes.
function customGeneLoci(){
  return (state.customGenes||[]).map(g=>({
    key: g.key,
    label: `${g.label} — Custom Gene`,
    isCustomGene: true,
    options: g.options,
  }));
}
function allLoci(){
  return [...GENETIC_LOCI, ...customGeneLoci()];
}

// ============================================
// GENE MUTATIONS / OVERRIDES
// A mutation extends an existing base gene (e.g. Roan) with extra allele
// options, but ONLY for horses of one specific Custom/Created breed — it
// doesn't get its own gene-cell, it just adds rows to the base gene's
// dropdown once that breed is selected. Built-ins live in
// BUILTIN_MUTATIONS below; affiliate-defined ones live in
// state.customMutations, added via Admin > Gene Mutations/Overrides.
// Shape: {id, breedName (lowercased Custom/Created breed name), locusKey
// (which GENETIC_LOCI key it extends), label, options:[{code,desc,price}]}
// ============================================
// Built-in mutations (Sealspot Roan, Restricted Dapple, Tiger Dun) removed
// for testing — add them back yourself via Admin > Gene Mutations/Overrides
// to confirm the extend-an-existing-gene pipeline still works end-to-end.
const BUILTIN_MUTATIONS = [];
function allMutations(){
  return [...BUILTIN_MUTATIONS, ...(state.customMutations||[])];
}
function mutationsFor(breed, locusKey){
  const key=(breed||"").trim().toLowerCase();
  if(!key) return [];
  return allMutations().filter(m=>m.locusKey===locusKey && (m.breedName||"").trim().toLowerCase()===key);
}
// Returns a locus's normal option list, plus any extra allele rows added
// by mutations attached to this specific breed — this is what should
// always be read from (instead of locus.options directly) anywhere a
// gene-cell's dropdown is built or a selected code needs to be resolved
// back to a description/price, so overrides show up transparently.
function breedLociFor(breed){
  const key=(breed||"").trim().toLowerCase();
  const custom=(state.customBreeds||[]).find(b=>(b.name||"").trim().toLowerCase()===key);
  return custom ? custom.loci : breedLociList(BREED_GENETICS[key]);
}

function getLocusOptions(locus, breed){
  const muts=mutationsFor(breed, locus.key);
  let options = muts.length ? [...locus.options, ...muts.flatMap(m=>m.options.map(o=>({...o})))] : locus.options;
  // Cream and Pearl share the "creampearl" locus, but many breeds carry only
  // one of them (Andalusians have Pearl and no Cream; Appaloosas the reverse).
  // Hide any genotype needing an allele the breed cannot have.
  if(locus.key==="creampearl"){
    const list=breedLociFor(breed);
    const hasCream = !list || list.includes("cream");
    const hasPearl = !list || list.includes("pearl");
    options = options.filter(o=>{
      if(/Cr/.test(o.code)  && !hasCream) return false;
      if(/Prl/.test(o.code) && !hasPearl) return false;
      return true;
    });
  }
  const restrictions=getAlleleRestrictions(breed);
  const allowedCodes=restrictions && restrictions[locus.key];
  if(allowedCodes) options = options.filter(o=>allowedCodes.includes(o.code));
  return options;
}

// Generates a unique, storage-safe key for a new custom gene from its
// display name (e.g. "Glimmer Coat (Gl)" -> "custom_glimmer_coat_gl"),
// avoiding collisions with built-in loci keys or other custom genes.
function slugifyGeneKey(label, existingGenes){
  const base = 'custom_' + (label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || 'gene');
  const taken = new Set([...GENETIC_LOCI.map(l=>l.key), ...(existingGenes||[]).map(g=>g.key)]);
  let key = base, n = 1;
  while(taken.has(key)){ n++; key = `${base}_${n}`; }
  return key;
}

function computeAppaloosaPattern(lp, patn1, patn2){
  const hasP1  = patn1 && patn1!=="patn1patn1";
  const hasP2  = patn2 && patn2!=="patn2patn2";
  const p2Homo = patn2==="PATN2PATN2";
  if(!lp || lp==="lplp") return null;
  if(lp==="LpLp"){
    if(p2Homo) return {label:"Snowcap Appaloosa", price:500};
    if(hasP1)  return {label:"Fewspot Appaloosa", price:500};
    return {label:"Varnish Appaloosa", price:900};
  }
  if(hasP1 && hasP2) return {label:"SemiLeopard Appaloosa", price:700};
  if(hasP1) return {label:"Leopard Appaloosa", price:700};
  if(hasP2) return {label:"Spotted Blanket Appaloosa", price:700};
  return {label:"Snowflake Appaloosa", price:900};
}

function computeBaseColor(extension, agouti){
  const blackBased = extension==="EE" || extension==="Ee";
  const a = agouti==="AAt" ? "AA" : agouti;
  // AtA, Ata, and Atat are all het/mixed At combinations — their allele
  // descriptions all read "Liver Chestnut / Seal Bay", so all three
  // resolve the same way here. Only AtAt (homozygous At) is the darker
  // "Black Chestnut / Seal Bay" tier.
  const sealBay = ["AtA","Ata","Atat"];
  // A+ is dominant over everything else at this locus, so any genotype
  // carrying it resolves to Wild Bay on a black-based horse. A+At still
  // carries one copy of At, which keeps darkening a *chestnut* coat (At's
  // only visible effect off black) — so that's the one wild-bay genotype
  // that isn't a plain Chestnut when extension is ee.
  const wildBay = ["A+A+","A+A","A+At","A+a"];
  if(wildBay.includes(a)){
    if(!blackBased) return a==="A+At" ? {label:"Liver Chestnut", price:600} : {label:"Chestnut", price:700};
    return {label:"Wild Bay", price:500};
  }

  if(!blackBased){
    if(a==="AtAt") return {label:"Black Chestnut", price:600};
    if(sealBay.includes(a)) return {label:"Liver Chestnut", price:600};
    return {label:"Chestnut", price:700};
  }
  if(a==="AtAt" || sealBay.includes(a)) return {label:"Seal Bay", price:600};
  if(a==="aa") return {label:"Black", price:500};
  return {label:"Bay", price:500};
}

// Sooty and Pangare are both well-documented as invisible on black-based
// coats (they only affect red pigment), so breeds fixed to solid black
// don't get them. Pangare is also specifically documented as much less
// common in refined "hot-blooded" and sport/warmblood breeds, and very
// common in ponies, drafts, and primitive-leaning breeds — so it's
// included/excluded per breed below rather than blanket-applied to all.
// Sources: Wikipedia (Pangaré, Sooty), TheEquinest, AQHA, Horse Reality Wiki.
//
// A breed entry can be a plain array of extra locus keys, OR an object
// { loci:[...], fixedExtension:"ee", fixedAgouti:"AA" } for breeds that
// are fixed to one base color (e.g. Friesian is always black, Haflinger
// is always chestnut) — see getFixedBase().
const BREED_GENETICS = {
  "thoroughbred":    ["sooty","grey","roan","sabino1"],
  "quarter horse":   ["sooty","pangare","cream","dun","tobiano","sabino1","splash","frame","roan","grey","pearl"],
  "paint":           ["sooty","pangare","cream","tobiano","sabino1","splash","frame","roan","grey","pearl"],
  "appaloosa":       ["sooty","pangare","cream","leopard","patn1","patn2","roan","sabino1","grey"],
  "knabstrupper":    ["sooty","pangare","leopard","patn1","patn2","grey"],
  "arabian":         ["sooty","grey","sabino1"],
  // Friesians are overwhelmingly black (KFPS studbook requires homozygous
  // black, EE, to fully register), but real bay/chestnut ("Fire Friesian")
  // lines do exist as a rarer separately-registered variant. Rather than
  // locking the breed to black only, Extension/Agouti are left open here —
  // a flavor note nudges toward black being the norm without blocking fun.
  "friesian":        ["sooty","flaxen"],
  // Haflingers can't carry the black gene at all — Extension is fixed to
  // ee (chestnut-based) — but every Agouti genotype is still selectable;
  // since Agouti only visibly expresses on black-based horses anyway, all
  // of those combinations phenotype out to the three chestnut shades
  // (Chestnut / Liver Chestnut / Black Chestnut) via computeBaseColor.
  // They're also always flaxen — every registered Haflinger carries at
  // least one Flaxen allele — so "No Flaxen" is excluded here via
  // alleleRestrictions rather than left as a pickable (but wrong) option.
  "haflinger":       { loci:["pangare","sabino1","flaxen"], fixedExtension:"ee",
                        alleleRestrictions:{ flaxen:["nF","FF"] } },
  "andalusian":      ["sooty","pangare","grey","dun","pearl"],
  "pre":             ["sooty","pangare","grey","dun","pearl"],
  "lipizzaner":      ["sooty","pangare","grey"],
  "clydesdale":      ["sooty","pangare","roan","tobiano","sabino1"],
  "percheron":       ["sooty","pangare","grey","roan"],
  "shetland pony":   ["sooty","pangare","cream","dun","tobiano","splash","sabino1","roan","grey"],
  "welsh pony":      ["sooty","pangare","cream","dun","tobiano","splash","sabino1","roan","grey"],
  "mustang":         ["sooty","pangare","cream","dun","roan","tobiano","sabino1","splash","frame","leopard","patn1","patn2","grey","pearl"],
  "akhal-teke":      ["sooty","cream","dun"],
  "icelandic":       ["sooty","pangare","dun","silver","roan","tobiano"],
  "gypsy vanner":    ["sooty","pangare","tobiano","sabino1","splash","roan"],
  "dutch warmblood": ["sooty","grey","roan"],
  "hanoverian":      ["sooty","grey","roan"],
  "warmblood":       ["sooty","grey","roan"],
};

function breedLociList(entry){
  return Array.isArray(entry) ? entry : (entry ? entry.loci : null);
}
function getFixedBase(breed){
  const key=(breed||"").trim().toLowerCase();
  const entry=BREED_GENETICS[key];
  if(entry && !Array.isArray(entry) && (entry.fixedExtension || entry.fixedAgouti)){
    return { extension: entry.fixedExtension||null, agouti: entry.fixedAgouti||null };
  }
  return null;
}
// Some breeds narrow (rather than fully fix) which alleles are pickable at
// a given locus — e.g. Haflingers can be Aa, aa, AtAt, etc. (Agouti stays
// fully open), but can never be "ff" (no Flaxen) since the breed always
// carries at least one Flaxen allele. Returns {locusKey:[allowedCodes]} or
// null if this breed has no such restrictions.
function getAlleleRestrictions(breed){
  const key=(breed||"").trim().toLowerCase();
  const entry=BREED_GENETICS[key];
  if(entry && !Array.isArray(entry) && entry.alleleRestrictions) return entry.alleleRestrictions;
  return null;
}

// A handful of breed names don't title-case cleanly (acronyms, hyphenation).
const BREED_DISPLAY_OVERRIDES = {
  "pre": "PRE (Pura Raza Española)",
  "akhal-teke": "Akhal-Teke",
};

function breedDisplayName(key){
  if(BREED_DISPLAY_OVERRIDES[key]) return BREED_DISPLAY_OVERRIDES[key];
  return key.replace(/\b\w/g, c=>c.toUpperCase());
}

// Locus labels carry a lot of descriptive text after " — " (dominance
// notes, what it's exclusive to, etc). Great as a hover tooltip, too long
// for a checkbox row — this trims it down to just the name + gene code.
function shortLocusLabel(locus){
  return locus.label.split(" — ")[0].trim();
}

// Builds the full Breed dropdown: hardcoded common real-world breeds, plus
// whatever Custom/Created breeds have been added via the Admin panel.
function getBreedOptionGroups(){
  const common = Object.keys(BREED_GENETICS).sort().map(key=>({key, name:breedDisplayName(key)}));
  const custom = (state.customBreeds||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));
  return {common, custom};
}

function getAllowedLoci(breed){
  const key=(breed||"").trim().toLowerCase();
  const optionalKeys=allLoci().filter(l=>!l.base).map(l=>l.key);
  const custom=(state.customBreeds||[]).find(b=>(b.name||"").trim().toLowerCase()===key);
  const restricted = custom ? custom.loci : breedLociList(BREED_GENETICS[key]);
  if(!restricted){
    // No matching breed found — either nothing's been picked yet in the
    // "— Select a breed —" dropdown, or a freeform "Other" name was typed
    // that doesn't match anything on record. Either way, genes that were
    // built exclusively for a specific Custom/Created breed (Custom Genes,
    // ILB Exclusive Genetics) should never leak in here — they should only
    // ever show up once the breed they were made for is actually selected.
    const exclusiveKeys = new Set([
      ...customGeneLoci().map(l=>l.key),
      ...GENETIC_LOCI.filter(l=>l.label.includes("ILB Exclusive")).map(l=>l.key),
    ]);
    return optionalKeys.filter(k=>!exclusiveKeys.has(k));
  }
  // Silver and Flaxen are the same underlying trait complex, just visible
  // on opposite base colors (Silver on black-based, Flaxen on chestnut).
  // Breed lists were only ever written with "silver" in mind, so carry
  // "flaxen" along automatically rather than requiring every breed entry
  // to be edited by hand.
  let list = restricted.includes("silver") && !restricted.includes("flaxen")
    ? [...restricted, "flaxen"]
    : restricted;
  // Cream and Pearl were merged into the single "creampearl" locus, since they
  // are alleles of one gene. Breed lists still name them separately, so a breed
  // allowing either one gets the merged locus; getLocusOptions() then hides
  // whichever alleles that breed shouldn't be able to carry.
  if(list.includes("cream") || list.includes("pearl")) list = [...list, "creampearl"];
  return optionalKeys.filter(k=>list.includes(k));
}

// ---------------------------------------------------------------------------
// computeColorName(): turns the base coat + every dilution/modifier gene into
// the single name people actually use for that horse — "Buckskin", "Pearlino",
// "Taffy", "Dunskin" — instead of listing each locus separately.
//
// computeBaseColor() has already resolved Extension + Agouti down to one of
// seven labels, so this function starts from that and layers dilutions on top.
//
// WILD BAY RULE: per the Agouti notes above, every dilution that acts on Bay
// acts identically on Wild Bay, "just tagged Wild". So Wild Bay is resolved
// through the ordinary Bay tables and then prefixed — Buckskin -> Wild
// Buckskin, Amber Champagne -> Wild Amber Champagne, Bay Dun -> Wild Bay Dun.
// Adding a new bay dilution below automatically gives you its wild twin.
//
// ORDER MATTERS: Dun resolves before Silver so that black + silver + dun
// reads "Silver Grullo" rather than "Silver Black Dun". Grey is applied last
// because it eventually covers everything else up.
// ---------------------------------------------------------------------------

// Which base label maps to which column in the tables below.
const COLOR_BASE_KEY = {
  "Chestnut":       "chestnut",
  "Liver Chestnut": "chestnut",
  "Black Chestnut": "chestnut",
  "Wild Bay":       "bay",      // resolved as Bay, then tagged "Wild"
  "Bay":            "bay",
  "Seal Bay":       "seal",
  "Black":          "black",
};

const COLOR_TABLES = {
  // one Cream, no Pearl
  singleCream: { chestnut:"Palomino", bay:"Buckskin", seal:"Seal Buckskin", black:"Smoky Black" },
  // two Creams — heavy dilution washes agouti out, so seal collapses onto bay
  doubleCream: { chestnut:"Cremello", bay:"Perlino", seal:"Perlino", black:"Smoky Cream" },
  // one Cream + at least one Pearl (pseudo-double dilute, distinct from Pearlino)
  creamPearl:  { chestnut:"Palomino Pearl", bay:"Buckskin Pearl", seal:"Buckskin Pearl", black:"Smoky Black Pearl" },
  // two Pearls, no Cream
  doublePearl: { chestnut:"Apricot", bay:"Amber Pearl", seal:"Sable Pearl", black:"Black Pearl" },
  // Champagne, no Cream
  champagne:   { chestnut:"Gold Champagne", bay:"Amber Champagne", seal:"Sable Champagne", black:"Classic Champagne" },
  // Champagne + Cream
  champCream:  { chestnut:"Gold Cream Champagne", bay:"Amber Cream Champagne", seal:"Sable Cream Champagne", black:"Classic Cream Champagne" },
  // Champagne + two Pearls
  champPearl:  { chestnut:"Gold Champagne Pearl", bay:"Amber Champagne Pearl", seal:"Sable Champagne Pearl", black:"Classic Champagne Pearl" },
  // Dun on an otherwise undiluted base
  dunBase:     { chestnut:"Red Dun", bay:"Bay Dun", seal:"Seal Dun", black:"Grullo" },
  // Dun stacked on a single-cream dilute earns its own portmanteau
  dunCream:    { chestnut:"Dunalino", bay:"Dunskin", seal:"Dunskin", black:"Smoky Grullo" },
  // Silver on an otherwise undiluted base. Taffy is the silver seal bay.
  silverBase:  { bay:"Silver Bay", seal:"Taffy", black:"Silver Black" },
  // Roan on an otherwise undiluted base
  roanBase:    { chestnut:"Red Roan", bay:"Bay Roan", seal:"Seal Roan", black:"Blue Roan" },
};

function computeColorName(selections, allowed, baseLabel){
  // A locus only counts if the breed allows it and something is selected.
  const on = (key, offCode) =>
    allowed.has(key) && selections[key] && selections[key] !== offCode;

  // Cream and Pearl are two alleles of ONE locus (MATP/SLC45A2), so a horse
  // carries exactly two of {Cr, Prl, n}. Count each allele out of the code.
  //   nn     0 cream 0 pearl   nCr    1 cream        CrCr   2 cream
  //   nPrl   1 pearl (silent)  PrlPrl 2 pearl        CrPrl  1 cream + 1 pearl
  const cpCode = allowed.has("creampearl") ? (selections.creampearl || "nn") : "nn";
  const cream = (cpCode.match(/Cr/g)  || []).length;
  const pearl = (cpCode.match(/Prl/g) || []).length;

  const isWild = baseLabel === "Wild Bay";
  const key = COLOR_BASE_KEY[baseLabel] || "bay";
  const redBased = key === "chestnut";
  const pick = (table) => table[key];

  const champagne = on("champagne", "chch");
  const dun       = on("dun", "dd");
  const sooty     = on("sooty", "stysty");
  const pangare   = on("pangare", "pngpng");
  const roan      = on("roan", "rnrn");
  const grey      = on("grey", "gg");
  // Silver and Flaxen can be CARRIED on the wrong base without showing. A
  // chestnut carrying Silver is still just a Chestnut, so an unexpressed
  // carrier must not affect the name at all.
  const silver    = on("silver", "zz") && !redBased;
  const flaxen    = on("flaxen", "ff") &&  redBased;

  // --- core: base + cream / pearl / champagne ------------------------------
  let core;
  let diluted = true;   // flipped to false in the plain-base branch

  if (champagne) {
    if (cream >= 1)       core = pick(COLOR_TABLES.champCream);
    else if (pearl === 2) core = pick(COLOR_TABLES.champPearl);
    else                  core = pick(COLOR_TABLES.champagne);
  } else if (cream === 2) {
    core = pick(COLOR_TABLES.doubleCream);
  } else if (cream === 1 && pearl >= 1) {
    core = pick(COLOR_TABLES.creamPearl);
  } else if (cream === 1) {
    core = pick(COLOR_TABLES.singleCream);
  } else if (pearl === 2) {
    core = pick(COLOR_TABLES.doublePearl);
  } else {
    // Undiluted. Keep computeBaseColor's own shade label, which already
    // encodes Liver / Black Chestnut from Agouti. Wild Bay becomes plain
    // "Bay" here and gets its "Wild" tag back at the end.
    core = isWild ? "Bay" : baseLabel;
    diluted = false;
  }

  // --- Flaxen: red pigment only -------------------------------------------
  if (flaxen && !diluted) core = "Flaxen " + core;

  // --- Dun (before Silver, so black+silver+dun = Silver Grullo) ------------
  if (dun) {
    if (!diluted && !flaxen)                        core = pick(COLOR_TABLES.dunBase);
    else if (!champagne && cream === 1 && pearl === 0) core = pick(COLOR_TABLES.dunCream);
    else                                            core = core + " Dun";
  }

  // --- Silver: black pigment only ------------------------------------------
  if (silver) {
    if (!diluted && !dun) core = pick(COLOR_TABLES.silverBase);
    else                  core = "Silver " + core;
  }

  // --- Roan -----------------------------------------------------------------
  if (roan) {
    if (!diluted && !dun && !silver && !flaxen) core = pick(COLOR_TABLES.roanBase);
    else                                        core = core + " Roan";
  }

  // --- Wild Bay tag. Applied to the finished color, before Sooty, so the
  // result is "Sooty Wild Buckskin" and not "Wild Sooty Buckskin".
  if (isWild && !/^Wild\b/.test(core)) core = "Wild " + core;

  // --- Sooty ----------------------------------------------------------------
  if (sooty) core = "Sooty " + core;

  // --- Pangare ---------------------------------------------------------------
  if (pangare) core = core + " with Pangare";

  // --- Grey covers everything, so it wraps rather than replaces ---------------
  if (grey) {
    const greyDesc = selections.grey === "GG" ? "Dappled Grey" : "Fleabitten Grey";
    core = `${greyDesc} (was ${core})`;
  }

  return core;
}

function computeGenoResult(selections, breed){
  const allowed = new Set(["extension","agouti", ...getAllowedLoci(breed)]);
  const base = computeBaseColor(selections.extension, selections.agouti);
  // Genes folded into the single color name by computeColorName(). They still
  // record in the genotype string and still price as modifiers — they just
  // aren't listed separately in the phenotype anymore.
  const COLOR_LOCI = new Set(["sooty","pangare","creampearl","dun",
                              "champagne","silver","flaxen","grey","roan"]);
  const phenoParts = [];
  const patternParts = [];
  const modifiers = [];
  const genoParts = [];
  if(selections.extension) genoParts.push(selections.extension);
  // Agouti is always recorded now: on chestnut it no longer expresses as bay,
  // but it still sets the shade (Liver / Black Chestnut) and passes to foals.
  if(selections.agouti) genoParts.push(selections.agouti);

  allLoci().filter(l=>!l.base).forEach(locus=>{
    if(!allowed.has(locus.key)) return;
    const code = selections[locus.key];
    if(!code) return;
    if(locus.requiresAny){
      const satisfiesAll=Object.entries(locus.requiresAny).every(([reqKey,reqCodes])=>reqCodes.includes(selections[reqKey]));
      if(!satisfiesAll) return;
    }
    if(["leopard","patn1","patn2","silver","flaxen"].includes(locus.key)) return;
    const opt = getLocusOptions(locus, breed).find(o=>o.code===code);
    if(!opt) return;
    genoParts.push(code);
    if(opt.price>0){
      if(!COLOR_LOCI.has(locus.key)) patternParts.push(opt.desc);
      modifiers.push({label:opt.desc, value:opt.price});
    }
  });

  if(allowed.has("leopard")){
    const appy = computeAppaloosaPattern(selections.leopard, selections.patn1, selections.patn2);
    if(selections.leopard) genoParts.push(selections.leopard);
    if(selections.patn1 && selections.patn1!=="patn1patn1") genoParts.push(selections.patn1);
    if(selections.patn2 && selections.patn2!=="patn2patn2") genoParts.push(selections.patn2);
    if(appy){
      patternParts.push(appy.label);
      modifiers.push({label:appy.label, value:appy.price});
    }
  }

  // Silver and Flaxen: the allele is always recorded in the genotype
  // string (so carrier status is visible even when not expressed), but
  // only shows up in the phenotype/price when it's actually expressed —
  // Silver on black-based (EE/Ee), Flaxen on chestnut (ee).
  const blackBased = selections.extension==="EE" || selections.extension==="Ee";
  const redBased = selections.extension==="ee";
  if(allowed.has("silver") && selections.silver){
    genoParts.push(selections.silver);
    const opt = GENETIC_LOCI.find(l=>l.key==="silver").options.find(o=>o.code===selections.silver);
    if(opt && opt.price>0 && blackBased){
      modifiers.push({label:opt.desc, value:opt.price});
    }
  }
  if(allowed.has("flaxen") && selections.flaxen){
    genoParts.push(selections.flaxen);
    const opt = GENETIC_LOCI.find(l=>l.key==="flaxen").options.find(o=>o.code===selections.flaxen);
    if(opt && opt.price>0 && redBased){
      modifiers.push({label:opt.desc, value:opt.price});
    }
  }

  // The color name comes first, then any white pattern / appaloosa markings.
  phenoParts.push(computeColorName(selections, allowed, base.label));
  patternParts.forEach(p=>phenoParts.push(p));

  return {
    genotype: genoParts.join(" "),
    phenotype: phenoParts.join(", "),
    genoBasePrice: base.price,
    genoModifiers: modifiers,
    totalPrice: base.price + modifiers.reduce((s,m)=>s+m.value,0),
  };
}

function calcShowEarnings(h){
  return (h.compHistory||[]).reduce((sum, c)=>{
    if(!c.placement || c.placement === 0) return sum;
    return sum + (SHOW_EARNING_VALUES[c.placement] || SHOW_EARNING_OTHER);
  }, 0);
}

function calcGenoPrice(h){
  const base = h.genoBasePrice || 0;
  const mods = (h.genoModifiers||[]).reduce((s, m)=>s + (m.value||0), 0);
  return base + mods;
}

function calcNetWorth(h){
  if(h.customNetWorth !== null && h.customNetWorth !== undefined && h.customNetWorth !== "") {
    return Number(h.customNetWorth);
  }
  return calcGenoPrice(h) + calcShowEarnings(h);
}

function calcSlotPrice(h){
  return Math.round(calcNetWorth(h) * 0.05);
}
